<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>서가 입력</title>
<style>
  :root {
    --ref: #3b82f6; --keep: #10b981; --toread: #f59e0b; --gift: #8b5cf6;
    --bg: #f8f7f4; --card: #fff; --ink: #1f2937; --sub: #6b7280; --line: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--ink);
    padding: env(safe-area-inset-top) 0 calc(90px + env(safe-area-inset-bottom));
  }
  header { padding: 18px 16px 10px; }
  header h1 { font-size: 20px; font-weight: 800; }
  header p { font-size: 13px; color: var(--sub); margin-top: 3px; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    margin: 0 12px 14px; overflow: hidden;
  }
  .cardhead {
    display: flex; gap: 8px; padding: 12px; border-bottom: 1px solid var(--line);
    align-items: center; background: #fafaf8;
  }
  .cardhead select {
    font-size: 17px; font-weight: 800; padding: 10px 8px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--card); font-family: inherit;
    -webkit-appearance: none; appearance: none; text-align: center; min-width: 86px;
  }
  .seg { display: flex; flex: 1; gap: 5px; }
  .seg button {
    flex: 1; padding: 10px 0; border-radius: 10px; border: 1.5px solid var(--line);
    background: var(--card); font-size: 13.5px; font-weight: 700; color: var(--sub);
    font-family: inherit;
  }
  .seg button.on[data-c="ref"] { background: var(--ref); border-color: var(--ref); color: #fff; }
  .seg button.on[data-c="keep"] { background: var(--keep); border-color: var(--keep); color: #fff; }
  .seg button.on[data-c="toread"] { background: var(--toread); border-color: var(--toread); color: #fff; }
  .seg button.on[data-c="gift"] { background: var(--gift); border-color: var(--gift); color: #fff; }
  .seg { flex-wrap: wrap; }
  .seg button { flex: 1 1 22%; font-size: 12.5px; padding: 9px 0; }
  .bk .g { color: var(--gift); font-size: 12px; flex-shrink: 0; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }

  .books { padding: 4px 14px; }
  .bk {
    display: flex; align-items: center; gap: 10px; padding: 9px 0;
    border-bottom: 1px solid var(--line); font-size: 15px;
  }
  .bk:last-child { border-bottom: none; }
  .bk .n { color: var(--sub); font-size: 12.5px; width: 20px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .bk .t { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .bk .a { color: var(--sub); font-size: 12.5px; flex-shrink: 0; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bk .del {
    border: none; background: none; color: #d1d5db; font-size: 20px; padding: 0 2px;
    flex-shrink: 0; line-height: 1;
  }
  .inputrow { display: flex; gap: 7px; padding: 10px 12px 12px; }
  .inputrow input {
    padding: 13px 12px; border: 1px solid var(--line); border-radius: 11px;
    font-size: 16px; font-family: inherit; background: var(--bg); min-width: 0;
  }
  .inputrow .ti { flex: 1.7; }
  .inputrow .au { flex: 1; }
  .inputrow button {
    padding: 0 18px; border-radius: 11px; border: none; background: var(--ink);
    color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; flex-shrink: 0;
  }
  .inputrow button:disabled { background: var(--line); color: var(--sub); }
  .count {
    margin-left: auto; font-size: 13px; font-weight: 800; color: var(--sub);
    background: var(--bg); border: 1px solid var(--line); padding: 6px 10px; border-radius: 999px;
    flex-shrink: 0; font-variant-numeric: tabular-nums;
  }

  .bottombar {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
    border-top: 1px solid var(--line); padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    display: flex; gap: 8px; z-index: 10;
  }
  .bottombar .send {
    flex: 1; padding: 15px 0; border-radius: 13px; border: none; background: var(--ink);
    color: #fff; font-size: 16px; font-weight: 800; font-family: inherit;
  }
  .bottombar .send:disabled { background: var(--line); color: var(--sub); }
  .bottombar .clear {
    padding: 0 16px; border-radius: 13px; border: 1px solid var(--line);
    background: var(--card); color: #dc2626; font-size: 14px; font-weight: 700; font-family: inherit;
  }
  .toast {
    position: fixed; bottom: calc(100px + env(safe-area-inset-bottom)); left: 50%;
    transform: translateX(-50%); background: var(--ink); color: #fff; padding: 11px 20px;
    border-radius: 999px; font-size: 14px; z-index: 50; opacity: 0; transition: opacity .2s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.on { opacity: 1; }
  .fallback {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 60;
    align-items: center; justify-content: center; padding: 20px;
  }
  .fallback.on { display: flex; }
  .fbbox { background: var(--card); border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; }
  .fbbox h3 { font-size: 16px; margin-bottom: 8px; }
  .fbbox p { font-size: 13px; color: var(--sub); margin-bottom: 12px; line-height: 1.6; }
  .fbbox textarea {
    width: 100%; height: 110px; font-size: 12px; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px; font-family: monospace;
  }
  .fbbox .row { display: flex; gap: 8px; margin-top: 12px; }
  .fbbox button {
    flex: 1; padding: 13px 0; border-radius: 11px; border: none; font-size: 15px;
    font-weight: 700; font-family: inherit;
  }
  .fbbox .copy { background: var(--ink); color: #fff; }
  .fbbox .close { background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
</style>
</head>
<body>

<header>
  <h1>📱 서가 입력</h1>
  <p>칸 ID와 분류를 정하고, 책등을 보며 쭉 입력하세요. 증정본은 저자가 증정자로 기록돼요.</p>
</header>

<div id="cards"></div>

<div class="bottombar">
  <button class="clear" onclick="clearAll()">비우기</button>
  <button class="send" id="sendbtn" onclick="sendData()">컴퓨터로 보내기</button>
</div>

<div class="toast" id="toast"></div>

<div class="fallback" id="fallback">
  <div class="fbbox">
    <h3>데이터 복사해서 보내기</h3>
    <p>아래 내용을 복사한 뒤, 메모나 메시지로 컴퓨터에 보내세요. 데스크톱 앱의 관리 탭 → "붙여넣기로 병합"에 넣으면 됩니다.</p>
    <textarea id="fbtext" readonly></textarea>
    <div class="row">
      <button class="close" onclick="document.getElementById('fallback').classList.remove('on')">닫기</button>
      <button class="copy" onclick="copyText()">복사하기</button>
    </div>
  </div>
</div>

<script>
const KEY = 'shelfinput-v1';
const SHELVES = ['A','B','C','D','E'];
const SLOTS_PER = 24;
const CATNAME = { ref: '참고', keep: '소장', toread: '읽을 책', gift: '증정본' };

let state = load();
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY));
    if (d && d.cards) return d;
  } catch(e) {}
  return { cards: [
    { slot: 'A-1', cat: 'ref', books: [] },
    { slot: 'A-2', cat: 'keep', books: [] },
    { slot: 'A-3', cat: 'toread', books: [] },
  ]};
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {} }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.remove('on'), 2000);
}

function slotOptions(current) {
  const opts = [];
  SHELVES.forEach(sh => {
    for (let i = 1; i <= SLOTS_PER; i++) {
      const id = sh + '-' + i;
      opts.push(`<option value="${id}" ${id===current?'selected':''}>${id}</option>`);
    }
  });
  return opts.join('');
}

function render() {
  const el = document.getElementById('cards');
  el.innerHTML = state.cards.map((c, ci) => {
    const isGift = c.cat === 'gift';
    const rows = c.books.map((b, bi) =>
      `<div class="bk">
        <span class="n">${bi+1}</span>
        <span class="t">${esc(b.title)}</span>
        ${b.author ? `<span class="${isGift?'g':'a'}">${isGift?'🎁 ':''}${esc(b.author)}</span>` : ''}
        <button class="del" onclick="delBook(${ci},${bi})">×</button>
      </div>`).join('');
    return `<div class="card">
      <div class="cardhead">
        <select onchange="setSlot(${ci}, this.value)">${slotOptions(c.slot)}</select>
        <div class="seg">
          <button data-c="ref" class="${c.cat==='ref'?'on':''}" onclick="setCat(${ci},'ref')">참고</button>
          <button data-c="keep" class="${c.cat==='keep'?'on':''}" onclick="setCat(${ci},'keep')">소장</button>
          <button data-c="toread" class="${c.cat==='toread'?'on':''}" onclick="setCat(${ci},'toread')">읽을 책</button>
          <button data-c="gift" class="${isGift?'on':''}" onclick="setCat(${ci},'gift')">증정본</button>
        </div>
        <span class="count">${c.books.length}권</span>
      </div>
      ${rows ? `<div class="books">${rows}</div>` : ''}
      <div class="inputrow">
        <input class="ti" id="ti-${ci}" type="text" placeholder="제목" autocomplete="off" enterkeyhint="done">
        <input class="au" id="au-${ci}" type="text" placeholder="${isGift?'저자 = 증정자':'저자(선택)'}" autocomplete="off" enterkeyhint="done">
        <button onclick="addBook(${ci})">추가</button>
      </div>
    </div>`;
  }).join('');

  // 엔터로 추가
  state.cards.forEach((c, ci) => {
    const ti = document.getElementById('ti-' + ci);
    const au = document.getElementById('au-' + ci);
    if (ti) ti.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addBook(ci); } });
    if (au) au.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addBook(ci); } });
  });

  const total = state.cards.reduce((s,c) => s + c.books.length, 0);
  const btn = document.getElementById('sendbtn');
  btn.textContent = total ? `컴퓨터로 보내기 (${total}권)` : '컴퓨터로 보내기';
  btn.disabled = !total;
}

function setSlot(ci, v) {
  // 다른 카드와 같은 칸이면 경고만 (막지는 않음 — 이어 입력 케이스)
  state.cards[ci].slot = v; save(); render();
}
function setCat(ci, c) { state.cards[ci].cat = c; save(); render(); }
function addBook(ci) {
  const ti = document.getElementById('ti-' + ci);
  const au = document.getElementById('au-' + ci);
  const title = ti.value.trim();
  if (!title) { ti.focus(); return; }
  const dup = state.cards.some(c => c.books.some(b => b.title === title));
  if (dup && !confirm(`"${title}" 은(는) 이미 입력했어요. 그래도 추가할까요?`)) { ti.value=''; ti.focus(); return; }
  state.cards[ci].books.push({ title, author: au.value.trim(), received: new Date().toISOString().slice(0,10) });
  save(); render();
  const nt = document.getElementById('ti-' + ci);
  if (nt) nt.focus();
}
function delBook(ci, bi) {
  state.cards[ci].books.splice(bi, 1);
  save(); render();
}
function clearAll() {
  const total = state.cards.reduce((s,c) => s + c.books.length, 0);
  if (!total) return;
  if (!confirm(`입력한 ${total}권을 모두 지울까요?\n(컴퓨터로 이미 보냈다면 지워도 안전해요)`)) return;
  state.cards.forEach(c => c.books = []);
  save(); render();
}

function buildExport() {
  const books = [];
  state.cards.forEach(c => c.books.forEach(b => {
    const rec = { title: b.title, author: b.author, cat: c.cat, slot: c.slot };
    if (c.cat === 'gift') {
      rec.giver = b.author || '';
      rec.received = b.received || new Date().toISOString().slice(0,10);
    }
    books.push(rec);
  }));
  return { type: 'shelfapp-mobile', date: new Date().toISOString().slice(0,10), books };
}

async function sendData() {
  const data = buildExport();
  if (!data.books.length) return;
  const json = JSON.stringify(data, null, 2);
  const fname = `서가입력_${data.date}.json`;

  // 1순위: iOS 공유 시트 (AirDrop으로 맥에 바로 전송)
  if (navigator.share) {
    try {
      const file = new File([json], fname, { type: 'application/json' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: '서가 입력 데이터' });
        toast('보냈어요! 데스크톱 앱에서 "파일로 병합"하세요');
        return;
      }
    } catch(e) { if (e.name === 'AbortError') return; }
  }
  // 2순위: 텍스트 복사
  document.getElementById('fbtext').value = json;
  document.getElementById('fallback').classList.add('on');
}
async function copyText() {
  const txt = document.getElementById('fbtext').value;
  try {
    await navigator.clipboard.writeText(txt);
    toast('복사했어요! 메모/메시지로 컴퓨터에 보내세요');
  } catch(e) {
    document.getElementById('fbtext').select();
    document.execCommand('copy');
    toast('복사했어요');
  }
}

render();
</script>
</body>
</html>
