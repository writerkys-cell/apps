<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="포모도로">
<title>포모도로</title>
<style>
:root{
  --bg:#FAFAFA; --fg:#222; --sub:#888; --line:#E2E2E2; --acc:#C0392B;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  font-size:17px; line-height:1.45;
  padding-top:env(safe-area-inset-top);
  padding-bottom:calc(env(safe-area-inset-bottom) + 24px);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
.wrap{max-width:480px; margin:0 auto; padding:12px 16px;}
button{
  font-family:inherit; background:none; border:none; color:var(--fg);
  min-width:44px; min-height:44px; font-size:20px; padding:6px; cursor:pointer;
}
button:disabled{opacity:.25;}
input[type=text],input[type=number]{
  font-family:inherit; font-size:16px; color:var(--fg);
  background:#fff; border:1px solid var(--line); border-radius:10px;
  padding:12px; width:100%; min-height:44px;
}
input:focus{outline:none; border-color:var(--acc);}

/* 헤더 */
.hdr{display:flex; justify-content:space-between; align-items:baseline; padding:6px 0 10px; border-bottom:1px solid var(--line);}
.hdr .date{font-size:17px; font-weight:600;}
.hdr .today{font-size:17px; color:var(--acc); font-weight:600;}

/* 현재 작업 */
.cur{padding:18px 0 14px; border-bottom:1px solid var(--line); text-align:center;}
.cur .idle{color:var(--sub); font-size:17px; padding:22px 0;}
.cur .title{
  font-size:22px; font-weight:700; text-decoration:underline;
  text-underline-offset:3px; word-break:keep-all; overflow-wrap:anywhere;
  display:inline-block; padding:4px 2px; min-height:44px;
}
.cur .title.nolink{text-decoration:none;}
.cur .timer{
  font-size:56px; font-weight:700; letter-spacing:1px;
  font-variant-numeric:tabular-nums; padding:6px 0; min-height:44px; cursor:pointer;
  user-select:none; -webkit-user-select:none;
}
.cur .timer.paused{color:var(--sub);}
.cur .meta{font-size:15px; color:var(--sub); margin-bottom:6px;}
.cur .meta .tag{color:var(--acc); font-weight:600;}
.cur .notice{font-size:15px; color:var(--acc); margin:2px 0 8px;}
.cur .btns{display:flex; justify-content:center; gap:24px; margin-top:4px;}
.cur .btns button{
  font-size:18px; font-weight:600; padding:10px 20px;
  border:1px solid var(--line); border-radius:12px; background:#fff;
}
.cur .btns .ok{color:var(--acc); border-color:var(--acc);}
.cur .breakLabel{font-size:17px; color:var(--sub); font-weight:600;}
.cur .longbox{padding:14px 0;}
.cur .longbox p{font-size:18px; font-weight:600; margin:0 0 12px; color:var(--acc);}

/* 할 일 리스트 */
.list{padding:0;}
.row{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); min-height:60px;}
.row .chk{
  flex:none; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.row .chk .box{
  width:26px; height:26px; border:1.5px solid var(--sub); border-radius:7px;
  display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--acc); background:#fff;
}
.row .main{flex:1; min-width:0; cursor:default; padding:4px 0;}
.row .main .tag{font-size:14px; color:var(--acc); font-weight:600; margin-right:6px;}
.row .main .cnt{font-size:14px; color:var(--sub); margin-left:6px;}
.row .main .ttl{font-size:18px; word-break:keep-all; overflow-wrap:anywhere;}
.row .acts{flex:none; display:flex;}
.row .acts button{color:var(--sub); font-size:19px; min-width:44px;}
.row .acts .play{color:var(--acc); font-size:21px;}

/* 인라인 수정 폼 */
.editForm{flex:1; padding:8px 0;}
.editForm input{margin-bottom:8px;}
.editForm .fr{display:flex; align-items:center; gap:8px;}
.editForm .del{color:var(--acc); font-size:16px; margin-right:auto; min-width:44px;}
.editForm .sv{color:var(--acc); font-size:22px;}
.editForm .cx{color:var(--sub); font-size:22px;}

/* 새 할 일 */
.newRow{display:flex; gap:8px; align-items:center; padding:14px 0;}
.newRow input{flex:1;}
.newRow button{font-size:26px; color:var(--acc); border:1px solid var(--line); border-radius:10px; background:#fff;}

/* 하단 메뉴 */
.menu{display:flex; justify-content:space-between; padding:8px 0; border-top:1px solid var(--line);}
.menu button{
  display:flex; flex-direction:column; align-items:center; gap:2px;
  color:var(--sub); font-size:20px; min-width:56px;
}
.menu button span{font-size:14px;}
.menu button.on{color:var(--acc);}

/* 패널 */
.panel{background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-top:8px;}
.panel h3{font-size:15px; color:var(--sub); font-weight:600; margin:0 0 10px;}
.panel .setRow{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.panel .setRow label{flex:1; font-size:16px;}
.panel .setRow input{width:90px; flex:none; text-align:center;}
.panel .saveBtn{display:block; margin:6px 0 0 auto; color:var(--acc); font-size:18px; font-weight:600; border:1px solid var(--acc); border-radius:10px; padding:8px 22px; background:#fff;}
.projRow{display:flex; align-items:center; padding:4px 0; border-bottom:1px solid var(--line);}
.projRow:last-child{border-bottom:none;}
.projRow .pn{flex:1; font-size:17px;}
.projRow .pc{font-size:16px; color:var(--acc); font-weight:600;}
.projRow button{color:var(--sub); font-size:17px;}
.avg{font-size:15px; color:var(--sub); margin-bottom:8px;}
.dayRow{padding:8px 0; border-bottom:1px solid var(--line);}
.dayRow:last-child{border-bottom:none;}
.dayRow .d1{font-size:17px; font-weight:600;}
.dayRow .d1 .dn{color:var(--acc); font-weight:600; margin-left:8px; font-size:16px;}
.dayRow .d2{font-size:15px; color:var(--sub);}
.dayRow .done{font-size:15px; color:var(--sub); margin-top:2px;}
.empty{color:var(--sub); font-size:15px; padding:6px 0;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="date" id="hDate"></div>
    <div class="today" id="hToday"></div>
  </div>

  <div class="cur" id="curArea"></div>

  <div class="list" id="taskList"></div>

  <div class="newRow">
    <input type="text" id="newTitle" placeholder="새 할 일" enterkeyhint="done">
    <button id="addBtn" aria-label="추가">＋</button>
  </div>

  <div class="menu">
    <button id="mLink">⛓<span>링크</span></button>
    <button id="mSet">⚙<span>설정</span></button>
    <button id="mHist">≡<span>기록</span></button>
    <button id="mBak">↓<span>백업</span></button>
    <button id="mRes">↑<span>복원</span></button>
  </div>

  <div class="panel hidden" id="setPanel">
    <h3>설정</h3>
    <div class="setRow"><label for="cfgWork">포모도로 시간 (분)</label><input type="number" id="cfgWork" min="1" max="120" inputmode="numeric"></div>
    <div class="setRow"><label for="cfgBrk">휴식 시간 (분)</label><input type="number" id="cfgBrk" min="1" max="60" inputmode="numeric"></div>
    <div class="setRow"><label for="cfgLong">긴 휴식 권고 주기 (회)</label><input type="number" id="cfgLong" min="1" max="20" inputmode="numeric"></div>
    <button class="saveBtn" id="cfgSave">✓ 저장</button>
  </div>

  <div class="panel hidden" id="histPanel">
    <h3>프로젝트별 (25분 환산)</h3>
    <div id="projHist"></div>
    <h3 style="margin-top:18px;">일별 기록 (최근 30일)</h3>
    <div id="dayHist"></div>
  </div>

  <datalist id="projList"></datalist>
  <input type="file" id="resFile" accept=".json,application/json" class="hidden">
</div>

<script>
(function(){
'use strict';
var KEY = 'pomoAppV1';
var WD = ['일','월','화','수','목','금','토'];
var S;                      // 앱 상태 (데이터 모델)
var editingId = null;       // 인라인 수정 중인 할 일 id
var longNotice = false;     // 긴 휴식 권고 표시 중
var breakDone = false;      // 휴식 종료 안내
var openPanel = null;       // 'set' | 'hist' | null
var lastDate = null;

/* ---------- 유틸 ---------- */
function r1(x){ return Math.round(x*10)/10; }
function pad(n){ return (n<10?'0':'')+n; }
function todayKey(){
  var d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function fmtDur(min){
  min = Math.round(min);
  if(min < 60) return min + '분';
  var h = Math.floor(min/60), m = min%60;
  return m ? h+'시간 '+m+'분' : h+'시간';
}
function findTask(id){
  for(var i=0;i<S.tasks.length;i++) if(S.tasks[i].id===id) return S.tasks[i];
  return null;
}

/* ---------- 저장/로드 ---------- */
function defaultState(){
  return { tasks:[], current:null, cycle:0, timer:null, history:{},
           cfg:{work:25, brk:5, longEvery:4}, projects:{} };
}
function load(){
  try{
    var raw = localStorage.getItem(KEY);
    S = raw ? migrate(JSON.parse(raw)) : defaultState();
  }catch(e){ S = defaultState(); }
  pruneHistory();
}
function save(){
  pruneHistory();
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){}
}
function pruneHistory(){
  var limit = new Date(); limit.setDate(limit.getDate()-29);
  var lk = limit.getFullYear()+'-'+pad(limit.getMonth()+1)+'-'+pad(limit.getDate());
  Object.keys(S.history).forEach(function(k){ if(k < lk) delete S.history[k]; });
}
function todayEntry(){
  var k = todayKey();
  if(!S.history[k]) S.history[k] = {n:0, min:0, done:[]};
  var e = S.history[k];
  if(typeof e.n !== 'number') e.n = +e.n || 0;
  if(typeof e.min !== 'number') e.min = +e.min || 0;
  if(!Array.isArray(e.done)) e.done = [];
  return e;
}

/* ---------- 마이그레이션 (구버전/외부 백업 수용) ---------- */
function migrate(d){
  if(!d || typeof d !== 'object' || !Array.isArray(d.tasks))
    throw new Error('bad format');
  var out = defaultState();
  out.tasks = d.tasks.map(function(t){
    return {
      id: String(t.id || uid()),
      title: String(t.title || ''),
      link: String(t.link || ''),
      proj: String(t.proj || ''),
      count: r1(+t.count || 0),
      createdAt: t.createdAt || new Date().toISOString(),
      startedAt: t.startedAt || null,
      checked: !!t.checked
    };
  });
  out.current = (typeof d.current === 'string') ? d.current : null;
  out.cycle = Math.max(0, Math.floor(+d.cycle || 0));
  out.timer = null;
  if(d.timer && typeof d.timer === 'object' && d.timer.endsAt){
    out.timer = {
      mode: d.timer.mode === 'break' ? 'break' : 'work',
      endsAt: +d.timer.endsAt,
      paused: !!d.timer.paused,
      remaining: (d.timer.remaining==null) ? null : +d.timer.remaining,
      total: +d.timer.total || null
    };
  }
  if(d.history && typeof d.history === 'object'){
    Object.keys(d.history).forEach(function(k){
      if(!/^\d{4}-\d{2}-\d{2}$/.test(k)) return;
      var v = d.history[k];
      if(typeof v === 'number'){                     // 구버전: 값이 숫자
        out.history[k] = {n:r1(v), min:Math.round(v*25), done:[]};
      }else if(v && typeof v === 'object'){
        out.history[k] = {
          n: r1(+v.n || 0),
          min: Math.round(+v.min || 0),
          done: Array.isArray(v.done) ? v.done.map(String) : []
        };
      }
    });
  }
  if(d.cfg && typeof d.cfg === 'object'){
    out.cfg.work = clamp(+d.cfg.work || 25, 1, 120);
    out.cfg.brk = clamp(+d.cfg.brk || 5, 1, 60);
    out.cfg.longEvery = clamp(+d.cfg.longEvery || 4, 1, 20);
  }
  if(d.projects && typeof d.projects === 'object'){
    Object.keys(d.projects).forEach(function(k){
      var v = +d.projects[k];
      if(k && !isNaN(v)) out.projects[k] = r1(v);
    });
  }
  // 구버전의 archive 등 그 외 키는 무시
  return out;
}
function clamp(v,a,b){ return Math.min(b, Math.max(a, Math.round(v))); }

/* ---------- 타이머 ---------- */
function remMs(t){
  if(!t) return 0;
  if(t.paused) return Math.max(0, t.remaining || 0);
  return Math.max(0, t.endsAt - Date.now());
}
function timerTotal(t){
  if(t.total) return t.total;
  return (t.mode==='work' ? S.cfg.work : S.cfg.brk) * 60000;
}
function isWorkFinished(){
  return S.timer && S.timer.mode==='work' && S.timer.paused && S.timer.remaining===0;
}
function startWork(id){
  if(S.current) return;
  var t = findTask(id);
  if(!t) return;
  S.current = id;
  if(!t.startedAt) t.startedAt = new Date().toISOString();
  var dur = S.cfg.work*60000;
  S.timer = {mode:'work', endsAt:Date.now()+dur, paused:false, remaining:null, total:dur};
  longNotice = false; breakDone = false;
  save(); render();
  runShortcut('포모도로');
}
function startBreak(){
  var dur = S.cfg.brk*60000;
  S.timer = {mode:'break', endsAt:Date.now()+dur, paused:false, remaining:null, total:dur};
}
function togglePause(){
  var t = S.timer;
  if(!t || isWorkFinished()) return;
  if(t.paused){
    t.endsAt = Date.now() + (t.remaining||0);
    t.paused = false; t.remaining = null;
  }else{
    t.remaining = Math.max(0, t.endsAt - Date.now());
    t.paused = true;
  }
  save(); render();
}
function finishTask(){
  var t = findTask(S.current);
  var elapsed = 0;
  if(S.timer && S.timer.mode==='work')
    elapsed = Math.max(0, timerTotal(S.timer) - remMs(S.timer));
  var n = r1(elapsed/1500000);            // 25분 = 1회
  var mins = Math.round(elapsed/60000);
  if(t){
    t.count = r1(t.count + n);
    t.checked = false;
    S.tasks.splice(S.tasks.indexOf(t),1);
    S.tasks.push(t);                       // 맨 아래로
    if(t.proj) S.projects[t.proj] = r1((S.projects[t.proj]||0) + n);
  }
  var e = todayEntry();
  e.n = r1(e.n + n); e.min += mins;
  S.current = null;
  S.cycle++;
  if(S.cfg.longEvery > 0 && S.cycle % S.cfg.longEvery === 0){
    S.timer = null; longNotice = true;
  }else{
    startBreak();
  }
  breakDone = false;
  save(); render();
  runShortcut('포모도로끝');
}
function invalidTask(){
  var t = findTask(S.current);
  if(t){
    S.tasks.splice(S.tasks.indexOf(t),1);
    S.tasks.unshift(t);                    // 맨 위로
  }
  S.current = null; S.timer = null;
  longNotice = false; breakDone = false;
  save(); render();
  runShortcut('포모도로끝');
}
function skipBreak(){
  S.timer = null; breakDone = false;
  save(); render();
}
function runShortcut(name){
  try{ location.href = 'shortcuts://run-shortcut?name=' + encodeURIComponent(name); }catch(e){}
}

/* ---------- 링크 ---------- */
function openLink(url){
  if(!url) return;
  try{
    if(/^https?:\/\//i.test(url)) window.open(url, '_blank');
    else location.href = url;
  }catch(e){}
}

/* ---------- 렌더링 ---------- */
function render(){
  renderHeader(); renderCurrent(); renderList(); renderDatalist();
  if(openPanel==='hist') renderHist();
}
function renderHeader(){
  var d = new Date();
  document.getElementById('hDate').textContent =
    d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate()+' ('+WD[d.getDay()]+')';
  var e = S.history[todayKey()];
  var n = e ? r1(+e.n||0) : 0;
  document.getElementById('hToday').textContent = '오늘 ' + n + ' 회';
}
function renderCurrent(){
  var el = document.getElementById('curArea');
  var t = S.timer;
  if(longNotice){
    el.innerHTML =
      '<div class="longbox"><p>포모도로 '+S.cycle+'회 완료 — 긴 휴식을 권합니다 (15~30분)</p>'+
      '<div class="btns"><button class="ok" data-act="closeLong">✓ 확인</button></div></div>';
    return;
  }
  if(S.current){
    var task = findTask(S.current);
    if(!task){ S.current=null; S.timer=null; save(); }
    else{
      var meta = '';
      if(task.proj) meta += '<span class="tag">#'+esc(task.proj)+'</span> · ';
      meta += '누적 '+r1(task.count)+'회';
      var notice = isWorkFinished()
        ? '<div class="notice">포모도로 종료 — ✓ 끝 또는 ✕ 무효를 눌러 주세요</div>' : '';
      el.innerHTML =
        '<div><span class="title'+(task.link?'':' nolink')+'" data-act="openCurLink">'+esc(task.title)+'</span></div>'+
        '<div class="timer'+(t&&t.paused&&!isWorkFinished()?' paused':'')+'" data-act="togglePause" id="timerDisp"></div>'+
        notice+
        '<div class="meta">'+meta+'</div>'+
        '<div class="btns"><button class="ok" data-act="finish">✓ 끝</button>'+
        '<button data-act="invalid">✕ 무효</button></div>';
      updateTimerDisplay();
      return;
    }
  }
  if(t && t.mode==='break'){
    el.innerHTML =
      '<div class="breakLabel">휴식</div>'+
      '<div class="timer'+(t.paused?' paused':'')+'" data-act="togglePause" id="timerDisp"></div>'+
      '<div class="btns"><button data-act="skipBreak">✕ 휴식 건너뛰기</button></div>';
    updateTimerDisplay();
    return;
  }
  var msg = breakDone ? '휴식 종료 — ▶ 를 눌러 다음 할 일을 시작하세요'
                      : '▶ 를 눌러 할 일을 시작하세요';
  el.innerHTML = '<div class="idle">'+esc(msg)+'</div>';
}
function updateTimerDisplay(){
  var disp = document.getElementById('timerDisp');
  if(!disp || !S.timer) return;
  var ms = remMs(S.timer);
  var sec = Math.ceil(ms/1000);
  disp.textContent = pad(Math.floor(sec/60)) + ':' + pad(sec%60);
}
function renderList(){
  var el = document.getElementById('taskList');
  var busy = !!S.current;
  var html = '';
  S.tasks.forEach(function(t){
    if(t.id === S.current) return;         // 진행 중인 할 일은 위 영역에
    if(t.id === editingId){ html += editFormHtml(t); return; }
    html +=
      '<div class="row" data-id="'+esc(t.id)+'">'+
        '<div class="chk" data-act="check"><div class="box">'+(t.checked?'✓':'')+'</div></div>'+
        '<div class="main">'+
          (t.proj?'<span class="tag">#'+esc(t.proj)+'</span>':'')+
          '<span class="ttl">'+esc(t.title)+'</span>'+
          '<span class="cnt">'+r1(t.count)+'회</span>'+
        '</div>'+
        '<div class="acts">'+
          '<button class="play" data-act="start"'+(busy?' disabled':'')+' aria-label="시작">▶</button>'+
          '<button data-act="edit" aria-label="수정">✎</button>'+
          '<button data-act="complete" aria-label="완료">★</button>'+
        '</div>'+
      '</div>';
  });
  if(!html) html = '<div class="empty" style="padding:14px 0;">할 일이 없습니다. 아래에서 추가하세요.</div>';
  el.innerHTML = html;
}
function editFormHtml(t){
  return '<div class="row" data-id="'+esc(t.id)+'"><div class="editForm">'+
    '<input type="text" id="efTitle" placeholder="제목" value="'+esc(t.title)+'">'+
    '<input type="text" id="efProj" placeholder="프로젝트" list="projList" value="'+esc(t.proj)+'">'+
    '<input type="text" id="efLink" placeholder="링크 (https:// 또는 URL 스킴)" value="'+esc(t.link)+'">'+
    '<div class="fr">'+
      '<button class="del" data-act="efDelete">− 삭제</button>'+
      '<button class="sv" data-act="efSave" aria-label="저장">✓</button>'+
      '<button class="cx" data-act="efCancel" aria-label="취소">✕</button>'+
    '</div></div></div>';
}
function renderDatalist(){
  var names = {};
  Object.keys(S.projects).forEach(function(k){ names[k]=1; });
  S.tasks.forEach(function(t){ if(t.proj) names[t.proj]=1; });
  document.getElementById('projList').innerHTML =
    Object.keys(names).sort().map(function(n){ return '<option value="'+esc(n)+'">'; }).join('');
}
function renderHist(){
  // 프로젝트별
  var pEl = document.getElementById('projHist');
  var keys = Object.keys(S.projects).sort(function(a,b){ return S.projects[b]-S.projects[a]; });
  pEl.innerHTML = keys.length
    ? keys.map(function(k){
        return '<div class="projRow" data-proj="'+esc(k)+'">'+
          '<span class="pn">#'+esc(k)+'</span><span class="pc">'+r1(S.projects[k])+'회</span>'+
          '<button data-act="delProj" aria-label="삭제">✕</button></div>';
      }).join('')
    : '<div class="empty">기록 없음</div>';
  // 일별
  var dEl = document.getElementById('dayHist');
  var days = Object.keys(S.history).sort().reverse();
  var sum = 0;
  days.forEach(function(k){ sum += (+S.history[k].n||0); });
  var avg = days.length ? r1(sum/days.length) : 0;
  var html = '<div class="avg">일 평균 '+avg+' 회</div>';
  if(!days.length) html += '<div class="empty">기록 없음</div>';
  days.forEach(function(k){
    var e = S.history[k];
    var parts = k.split('-');
    var done = (e.done&&e.done.length)
      ? '<div class="done">★ '+e.done.map(esc).join(' · ')+'</div>' : '';
    html += '<div class="dayRow">'+
      '<div class="d1">'+(+parts[1])+'.'+(+parts[2])+'<span class="dn">'+r1(+e.n||0)+'회</span></div>'+
      '<div class="d2">'+fmtDur(+e.min||0)+'</div>'+done+'</div>';
  });
  dEl.innerHTML = html;
}

/* ---------- 할 일 관리 ---------- */
function addTask(){
  var inp = document.getElementById('newTitle');
  var title = inp.value.trim();
  if(!title) return;
  S.tasks.push({ id:uid(), title:title, link:'', proj:'', count:0,
                 createdAt:new Date().toISOString(), startedAt:null, checked:false });
  inp.value = '';
  save(); render();
}
function saveEdit(id){
  var t = findTask(id);
  if(!t) return;
  var title = document.getElementById('efTitle').value.trim();
  if(!title){ alert('제목을 입력하세요.'); return; }
  t.title = title;
  t.proj = document.getElementById('efProj').value.trim();
  t.link = document.getElementById('efLink').value.trim();
  editingId = null;
  save(); render();
}
function deleteTask(id){
  var t = findTask(id);
  if(!t) return;
  if(!confirm('"'+t.title+'" 을(를) 삭제할까요?')) return;
  S.tasks.splice(S.tasks.indexOf(t),1);
  editingId = null;
  save(); render();
}
function completeTask(id){
  var t = findTask(id);
  if(!t) return;
  if(!confirm('"'+t.title+'" 을(를) 완료 처리할까요?\n리스트에서 제거되고 오늘 기록에 남습니다.')) return;
  todayEntry().done.push(t.title);
  S.tasks.splice(S.tasks.indexOf(t),1);
  save(); render();
}

/* ---------- 패널/메뉴 ---------- */
function togglePanel(name){
  openPanel = (openPanel===name) ? null : name;
  document.getElementById('setPanel').classList.toggle('hidden', openPanel!=='set');
  document.getElementById('histPanel').classList.toggle('hidden', openPanel!=='hist');
  document.getElementById('mSet').classList.toggle('on', openPanel==='set');
  document.getElementById('mHist').classList.toggle('on', openPanel==='hist');
  if(openPanel==='set'){
    document.getElementById('cfgWork').value = S.cfg.work;
    document.getElementById('cfgBrk').value = S.cfg.brk;
    document.getElementById('cfgLong').value = S.cfg.longEvery;
  }
  if(openPanel==='hist') renderHist();
}
function saveCfg(){
  var w = clamp(+document.getElementById('cfgWork').value || 25, 1, 120);
  var b = clamp(+document.getElementById('cfgBrk').value || 5, 1, 60);
  var l = clamp(+document.getElementById('cfgLong').value || 4, 1, 20);
  S.cfg = {work:w, brk:b, longEvery:l};
  save();
  togglePanel('set');
}

/* ---------- 백업/복원 ---------- */
function backup(){
  var blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pomodoro-backup-' + todayKey() + '.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 2000);
}
function restoreFile(file){
  var reader = new FileReader();
  reader.onload = function(){
    var data;
    try{ data = migrate(JSON.parse(reader.result)); }
    catch(e){ alert('백업 파일 형식이 올바르지 않습니다.'); return; }
    if(!confirm('복원하면 현재 데이터가 모두 교체됩니다.\n할 일 '+data.tasks.length+'개 · 기록 '+Object.keys(data.history).length+'일\n계속할까요?')) return;
    data.timer = null; data.current = null;      // 진행 중 상태 초기화
    S = data;
    editingId = null; longNotice = false; breakDone = false;
    save(); render();
    alert('복원되었습니다.');
  };
  reader.onerror = function(){ alert('파일을 읽지 못했습니다.'); };
  reader.readAsText(file);
}

/* ---------- 주기 처리 ---------- */
function tick(){
  var t = S.timer;
  if(t && !t.paused && Date.now() >= t.endsAt){
    if(t.mode==='work'){
      t.paused = true; t.remaining = 0;          // 종료 상태 (안내 문구만)
      save(); render();
    }else{
      S.timer = null; breakDone = true;
      save(); render();
    }
  }else{
    updateTimerDisplay();
  }
  var tk = todayKey();
  if(tk !== lastDate){ lastDate = tk; pruneHistory(); save(); render(); }
}

/* ---------- 이벤트 ---------- */
document.addEventListener('click', function(ev){
  var btn = ev.target.closest('[data-act]');
  if(!btn) return;
  var act = btn.getAttribute('data-act');
  var row = btn.closest('[data-id]');
  var id = row ? row.getAttribute('data-id') : null;
  switch(act){
    case 'togglePause': togglePause(); break;
    case 'finish': finishTask(); break;
    case 'invalid': invalidTask(); break;
    case 'skipBreak': skipBreak(); break;
    case 'closeLong': longNotice=false; render(); break;
    case 'openCurLink':
      var ct = findTask(S.current);
      if(ct && ct.link) openLink(ct.link);
      break;
    case 'check':
      var t1 = findTask(id);
      if(t1){ t1.checked = !t1.checked; save(); render(); }
      break;
    case 'start': startWork(id); break;
    case 'edit': editingId = (editingId===id)?null:id; render(); break;
    case 'complete': completeTask(id); break;
    case 'efSave': saveEdit(id); break;
    case 'efCancel': editingId=null; render(); break;
    case 'efDelete': deleteTask(id); break;
    case 'delProj':
      var pr = btn.closest('[data-proj]').getAttribute('data-proj');
      if(confirm('#'+pr+' 프로젝트 누적 기록을 삭제할까요?\n일별 기록에는 영향이 없습니다.')){
        delete S.projects[pr]; save(); render();
      }
      break;
  }
});
document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('newTitle').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ e.preventDefault(); addTask(); this.blur(); }
});
document.getElementById('mLink').addEventListener('click', function(){
  window.open('https://writerkys-cell.github.io/apps/links', '_blank');
});
document.getElementById('mSet').addEventListener('click', function(){ togglePanel('set'); });
document.getElementById('mHist').addEventListener('click', function(){ togglePanel('hist'); });
document.getElementById('cfgSave').addEventListener('click', saveCfg);
document.getElementById('mBak').addEventListener('click', backup);
document.getElementById('mRes').addEventListener('click', function(){
  document.getElementById('resFile').click();
});
document.getElementById('resFile').addEventListener('change', function(){
  if(this.files && this.files[0]) restoreFile(this.files[0]);
  this.value = '';
});
document.addEventListener('visibilitychange', function(){
  if(!document.hidden) tick();
});
window.addEventListener('pageshow', tick);

/* ---------- 시작 ---------- */
load();
lastDate = todayKey();
// 로드 시: 이미 끝난 타이머 정리
if(S.timer && !S.timer.paused && Date.now() >= S.timer.endsAt){
  if(S.timer.mode==='work'){ S.timer.paused=true; S.timer.remaining=0; }
  else { S.timer=null; breakDone=true; }
  save();
}
if(S.current && !findTask(S.current)){ S.current=null; S.timer=null; save(); }
render();
setInterval(tick, 250);
})();
</script>
