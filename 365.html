<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>책 365 — 평생의 책, 하루 한 권</title>
<style>
  :root{
    --bg:#f6f4ef; --card:#ffffff; --ink:#1f2328; --sub:#6b7280;
    --accent:#0f5c4e; --accent-soft:#e3efec; --line:#e5e1d8;
    --danger:#b4372f; --gold:#c9a227;
    --shadow:0 2px 12px rgba(31,35,40,.07), 0 12px 40px rgba(31,35,40,.06);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;
    line-height:1.55;
  }
  .wrap{max-width:1040px; margin:0 auto; padding:28px 20px 80px;}

  /* ===== 헤더 ===== */
  header{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:22px;}
  header h1{font-size:26px; letter-spacing:-.5px;}
  header h1 .num{color:var(--accent);}
  header .tag{color:var(--sub); font-size:14px;}

  /* ===== 오늘의 책 ===== */
  .hero{
    background:linear-gradient(135deg,#103f36 0%, #0f5c4e 55%, #1b7a63 100%);
    color:#fdfcf8; border-radius:22px; box-shadow:var(--shadow);
    padding:36px 38px; display:flex; gap:38px; align-items:center; margin-bottom:26px;
    position:relative; overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; right:-70px; top:-70px; width:260px; height:260px;
    border-radius:50%; background:rgba(255,255,255,.06);
  }
  .hero .cover{
    width:190px; min-width:190px; height:270px; border-radius:10px;
    box-shadow:0 14px 34px rgba(0,0,0,.4); background:#fff;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    font-size:54px; font-weight:800; color:var(--accent); z-index:1;
  }
  .hero .cover img{width:100%; height:100%; object-fit:cover; display:block;}
  .hero .info{z-index:1; flex:1; min-width:0;}
  .hero .date{font-size:15px; opacity:.85; letter-spacing:.5px;}
  .hero .daynum{
    display:inline-block; margin:10px 0 14px; padding:5px 14px; border-radius:999px;
    background:rgba(255,255,255,.14); font-size:14px; font-weight:700; letter-spacing:.5px;
  }
  .hero h2{font-size:34px; line-height:1.25; letter-spacing:-.5px; margin-bottom:8px; word-break:keep-all;}
  .hero .author{font-size:17px; opacity:.9;}
  .hero .memo{margin-top:14px; font-size:14.5px; opacity:.8; max-width:520px; word-break:keep-all;}
  .hero .empty-msg{font-size:18px; opacity:.9;}

  /* ===== 도구 막대 ===== */
  .toolbar{
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:22px; box-shadow:var(--shadow);
  }
  .toolbar label{font-size:13.5px; color:var(--sub); display:flex; align-items:center; gap:7px;}
  .toolbar input[type=date]{
    border:1px solid var(--line); border-radius:8px; padding:6px 9px; font-size:14px;
    background:#fff; color:var(--ink); font-family:inherit;
  }
  .spacer{flex:1;}
  button{
    font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:var(--ink);
    padding:8px 15px; border-radius:9px; transition:.15s;
  }
  button:hover{border-color:var(--accent); color:var(--accent);}
  button.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  button.primary:hover{filter:brightness(1.12); color:#fff;}
  .count-badge{font-size:13.5px; color:var(--sub);}
  .count-badge b{color:var(--accent); font-size:16px;}

  /* ===== 리스트 ===== */
  .list-head{display:flex; align-items:baseline; justify-content:space-between; margin:0 4px 12px;}
  .list-head h3{font-size:19px; letter-spacing:-.3px;}
  .list-head .hint{font-size:12.5px; color:var(--sub);}
  #bookList{list-style:none;}
  .book-item{
    display:flex; align-items:center; gap:14px;
    background:var(--card); border:1px solid var(--line); border-radius:13px;
    padding:10px 14px; margin-bottom:9px; box-shadow:0 1px 4px rgba(31,35,40,.04);
    cursor:grab; transition:box-shadow .15s, transform .15s, border-color .15s;
  }
  .book-item:hover{box-shadow:var(--shadow);}
  .book-item.dragging{opacity:.45; cursor:grabbing;}
  .book-item.drag-over-top{border-top:3px solid var(--accent);}
  .book-item.drag-over-bottom{border-bottom:3px solid var(--accent);}
  .book-item.today{border:2px solid var(--gold); background:#fffdf4;}
  .rank{
    min-width:44px; height:44px; border-radius:11px; background:var(--accent-soft);
    color:var(--accent); font-weight:800; font-size:16px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    user-select:none;
  }
  .rank:hover{outline:2px solid var(--accent);}
  .thumb{
    width:44px; min-width:44px; height:62px; border-radius:6px; overflow:hidden;
    background:var(--accent-soft); display:flex; align-items:center; justify-content:center;
    font-weight:800; color:var(--accent); font-size:18px;
  }
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .meta{flex:1; min-width:0;}
  .meta .t{font-weight:700; font-size:15.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .meta .a{font-size:13px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item-btns{display:flex; gap:6px;}
  .item-btns button{padding:6px 10px; font-size:12.5px;}
  .item-btns .del:hover{border-color:var(--danger); color:var(--danger);}
  .drag-handle{color:#c8c3b8; font-size:18px; letter-spacing:-2px; padding:0 2px; user-select:none;}
  .empty-list{
    text-align:center; color:var(--sub); padding:60px 20px;
    background:var(--card); border:1px dashed var(--line); border-radius:14px; font-size:15px;
  }

  /* ===== 모달 ===== */
  dialog{
    border:none; border-radius:18px; padding:0; width:min(480px, 92vw);
    box-shadow:0 24px 80px rgba(0,0,0,.25);
  }
  dialog::backdrop{background:rgba(20,24,28,.45); backdrop-filter:blur(2px);}
  .modal-inner{padding:26px 26px 22px;}
  .modal-inner h3{font-size:19px; margin-bottom:16px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:13px; color:var(--sub); margin-bottom:5px; font-weight:600;}
  .field input, .field textarea{
    width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 11px;
    font-size:14.5px; font-family:inherit; background:#fff; color:var(--ink);
  }
  .field input:focus, .field textarea:focus{outline:2px solid var(--accent-soft); border-color:var(--accent);}
  .field textarea{resize:vertical; min-height:60px;}
  .field .note{font-size:12px; color:var(--sub); margin-top:4px;}
  .modal-btns{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 20px; border-radius:10px;
    font-size:14px; opacity:0; pointer-events:none; transition:.3s; z-index:99;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (max-width:640px){
    .hero{flex-direction:column; text-align:center; padding:28px 22px;}
    .hero h2{font-size:26px;}
    .hero .memo{margin-left:auto; margin-right:auto;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>📚 책 <span class="num">365</span></h1>
    <span class="tag">평생의 책을 간추려, 하루에 한 권씩.</span>
  </header>

  <!-- 오늘의 책 -->
  <section class="hero" id="hero"></section>

  <!-- 도구 막대 -->
  <div class="toolbar">
    <label>읽기 시작일 <input type="date" id="startDate"></label>
    <span class="count-badge">등록된 책 <b id="bookCount">0</b> / 365권</span>
    <div class="spacer"></div>
    <button id="promptBtn">✨ 신간 추천 프롬프트</button>
    <button id="exportBtn">💾 백업(JSON)</button>
    <button id="importBtn">📂 불러오기</button>
    <input type="file" id="importFile" accept=".json" hidden>
    <button class="primary" id="addBtn">＋ 새 책 추가</button>
  </div>

  <!-- 리스트 -->
  <div class="list-head">
    <h3>나의 책 리스트</h3>
    <span class="hint">항목을 드래그해서 순서를 바꾸거나, 번호를 클릭해 순위를 직접 입력할 수 있어요.</span>
  </div>
  <ul id="bookList"></ul>

</div>

<!-- 추가/수정 모달 -->
<dialog id="bookModal">
  <form class="modal-inner" id="bookForm" method="dialog">
    <h3 id="modalTitle">새 책 추가</h3>
    <div class="field">
      <label>제목 *</label>
      <input type="text" id="fTitle" required placeholder="예) 데미안">
    </div>
    <div class="field">
      <label>저자</label>
      <input type="text" id="fAuthor" placeholder="예) 헤르만 헤세">
    </div>
    <div class="field">
      <label>표지 이미지 주소 (URL)</label>
      <input type="url" id="fCover" placeholder="https:// 로 시작하는 이미지 주소">
    </div>
    <div class="field">
      <label>메모 (이 책을 고른 이유 등)</label>
      <textarea id="fMemo"></textarea>
    </div>
    <div class="field">
      <label>순위 (몇 번째 책으로 넣을까요?)</label>
      <input type="number" id="fRank" min="1">
      <div class="note">해당 순위에 끼워 넣으면 그 뒤의 책들은 한 칸씩 밀려납니다.</div>
    </div>
    <div class="modal-btns">
      <button type="button" id="cancelBtn">취소</button>
      <button type="submit" class="primary" id="saveBtn">저장</button>
    </div>
  </form>
</dialog>

<!-- 신간 추천 프롬프트 모달 -->
<dialog id="promptModal">
  <div class="modal-inner">
    <h3>✨ AI에게 신간 추천 부탁하기</h3>
    <p style="font-size:13.5px; color:var(--sub); margin-bottom:14px;">
      내 리스트를 바탕으로 최근 5년 신간 추천을 부탁하는 프롬프트입니다.
      복사해서 Claude 등 AI 채팅에 붙여넣으세요.
    </p>
    <div class="field" style="display:flex; gap:14px; align-items:center;">
      <label style="margin:0;">추천 권수
        <select id="pCount" style="margin-left:6px; border:1px solid var(--line); border-radius:8px; padding:5px 8px; font-family:inherit; font-size:14px;">
          <option value="5">5권</option>
          <option value="10" selected>10권</option>
          <option value="20">20권</option>
        </select>
      </label>
    </div>
    <div class="field">
      <label>추가 요청 (선택)</label>
      <input type="text" id="pExtra" placeholder="예) 소설 위주로, 번역서 포함, 500쪽 이하로">
    </div>
    <div class="field">
      <label>생성된 프롬프트</label>
      <textarea id="pText" style="min-height:220px; font-size:13.5px; line-height:1.6;"></textarea>
    </div>
    <div class="modal-btns">
      <button type="button" id="pClose">닫기</button>
      <button type="button" class="primary" id="pCopy">📋 프롬프트 복사</button>
    </div>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
(function(){
  const LS_KEY = 'book365_data_v1';

  // ===== 상태 =====
  let state = { books: [], startDate: null };
  let editingIndex = null;   // null = 새 책 추가
  let dragIndex = null;

  // ===== 저장/불러오기 =====
  function load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(raw){ state = Object.assign({books:[], startDate:null}, JSON.parse(raw)); }
    }catch(e){ console.warn(e); }
    if(!state.startDate){
      const now = new Date();
      state.startDate = now.getFullYear() + '-01-01';
    }
  }
  function save(){
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  }

  // ===== 유틸 =====
  const $ = s => document.querySelector(s);
  function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function toast(msg){
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'), 2200);
  }
  function fmtDate(d){
    const days = ['일','월','화','수','목','금','토'];
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  }
  // 오늘이 몇 번째 날인지 (시작일 = 1일차). 365를 넘으면 다시 1부터 순환.
  function todayInfo(){
    const today = new Date(); today.setHours(0,0,0,0);
    const start = new Date(state.startDate + 'T00:00:00');
    const diff = Math.round((today - start) / 86400000);
    if(diff < 0) return { day:null, cycle:null, date:today, before:true };
    return { day:(diff % 365) + 1, cycle:Math.floor(diff / 365) + 1, date:today, before:false };
  }
  function coverHTML(book, cls){
    if(book.cover){
      return `<div class="${cls}"><img src="${esc(book.cover)}" alt="표지" onerror="this.parentNode.textContent='${esc((book.title||'책').charAt(0))}'"></div>`;
    }
    return `<div class="${cls}">${esc((book.title||'책').charAt(0))}</div>`;
  }

  // ===== 렌더링 =====
  function renderHero(){
    const info = todayInfo();
    const hero = $('#hero');
    let inner = `<div class="info"><div class="date">${fmtDate(info.date)}</div>`;
    if(info.before){
      inner += `<h2 style="margin-top:10px">아직 시작 전이에요</h2>
        <div class="memo">읽기 시작일(${esc(state.startDate)})이 되면 첫 번째 책이 나타납니다.</div></div>`;
      hero.innerHTML = inner; return;
    }
    const book = state.books[info.day - 1];
    const cycleTxt = info.cycle > 1 ? ` · ${info.cycle}회차` : '';
    if(!book){
      inner += `<div class="daynum">DAY ${info.day} / 365${cycleTxt}</div>
        <div class="empty-msg">오늘(${info.day}번)에 해당하는 책이 아직 없어요.<br>리스트에 책을 채워 주세요!</div></div>`;
      hero.innerHTML = inner; return;
    }
    hero.innerHTML =
      coverHTML(book, 'cover') +
      `<div class="info">
        <div class="date">${fmtDate(info.date)}</div>
        <div class="daynum">DAY ${info.day} / 365${cycleTxt} · 오늘의 책</div>
        <h2>${esc(book.title)}</h2>
        <div class="author">${esc(book.author || '저자 미상')}</div>
        ${book.memo ? `<div class="memo">“${esc(book.memo)}”</div>` : ''}
      </div>`;
  }

  function renderList(){
    const ul = $('#bookList');
    $('#bookCount').textContent = state.books.length;
    if(state.books.length === 0){
      ul.innerHTML = '<li class="empty-list">아직 책이 없습니다. 오른쪽 위 <b>＋ 새 책 추가</b> 버튼으로 첫 책을 등록해 보세요.</li>';
      return;
    }
    const info = todayInfo();
    ul.innerHTML = state.books.map((b, i) => `
      <li class="book-item ${(!info.before && info.day === i+1) ? 'today' : ''}" draggable="true" data-i="${i}">
        <span class="drag-handle">⠿</span>
        <span class="rank" title="클릭해서 순위 직접 입력">${i+1}</span>
        ${coverHTML(b, 'thumb')}
        <div class="meta">
          <div class="t">${esc(b.title)}</div>
          <div class="a">${esc(b.author || '')}</div>
        </div>
        <div class="item-btns">
          <button type="button" class="edit">수정</button>
          <button type="button" class="del">삭제</button>
        </div>
      </li>`).join('');
    bindListEvents();
  }

  function renderAll(){ renderHero(); renderList(); save(); }

  // ===== 리스트 이벤트 (드래그 / 수정 / 삭제 / 순위 입력) =====
  function bindListEvents(){
    document.querySelectorAll('.book-item').forEach(li => {
      const i = +li.dataset.i;

      li.addEventListener('dragstart', e => {
        dragIndex = i; li.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      li.addEventListener('dragend', () => {
        li.classList.remove('dragging');
        clearDragMarks();
      });
      li.addEventListener('dragover', e => {
        e.preventDefault();
        if(dragIndex === null || dragIndex === i) return;
        const rect = li.getBoundingClientRect();
        const below = (e.clientY - rect.top) > rect.height / 2;
        li.classList.toggle('drag-over-bottom', below);
        li.classList.toggle('drag-over-top', !below);
      });
      li.addEventListener('dragleave', () => {
        li.classList.remove('drag-over-top','drag-over-bottom');
      });
      li.addEventListener('drop', e => {
        e.preventDefault();
        if(dragIndex === null || dragIndex === i) return;
        const rect = li.getBoundingClientRect();
        const below = (e.clientY - rect.top) > rect.height / 2;
        let to = i + (below ? 1 : 0);
        if(dragIndex < to) to--;
        moveBook(dragIndex, to);
        dragIndex = null;
      });

      li.querySelector('.rank').addEventListener('click', () => {
        const v = prompt(`"${state.books[i].title}"을(를) 몇 번째로 옮길까요? (1~${state.books.length})`, i+1);
        if(v === null) return;
        const n = parseInt(v, 10);
        if(isNaN(n) || n < 1 || n > state.books.length){ toast('올바른 번호를 입력해 주세요.'); return; }
        moveBook(i, n-1);
      });
      li.querySelector('.edit').addEventListener('click', () => openModal(i));
      li.querySelector('.del').addEventListener('click', () => {
        if(confirm(`"${state.books[i].title}"을(를) 삭제할까요?\n뒤의 책들이 한 칸씩 앞으로 당겨집니다.`)){
          state.books.splice(i,1); renderAll(); toast('삭제했습니다.');
        }
      });
    });
  }
  function clearDragMarks(){
    document.querySelectorAll('.book-item').forEach(el =>
      el.classList.remove('drag-over-top','drag-over-bottom'));
  }
  function moveBook(from, to){
    const [b] = state.books.splice(from, 1);
    state.books.splice(to, 0, b);
    renderAll();
    toast(`"${b.title}" → ${to+1}번으로 이동`);
  }

  // ===== 모달 =====
  const modal = $('#bookModal');
  function openModal(index){
    editingIndex = (typeof index === 'number') ? index : null;
    const b = editingIndex !== null ? state.books[editingIndex] : {};
    $('#modalTitle').textContent = editingIndex !== null ? '책 정보 수정' : '새 책 추가';
    $('#fTitle').value  = b.title  || '';
    $('#fAuthor').value = b.author || '';
    $('#fCover').value  = b.cover  || '';
    $('#fMemo').value   = b.memo   || '';
    const max = editingIndex !== null ? state.books.length : Math.min(state.books.length + 1, 365);
    $('#fRank').max = max;
    $('#fRank').value = editingIndex !== null ? editingIndex + 1 : max;
    modal.showModal();
    $('#fTitle').focus();
  }
  $('#addBtn').addEventListener('click', () => {
    if(state.books.length >= 365){
      toast('365권이 모두 찼습니다. 기존 책을 삭제하거나 수정해 주세요.');
      return;
    }
    openModal();
  });
  $('#cancelBtn').addEventListener('click', () => modal.close());
  $('#bookForm').addEventListener('submit', e => {
    e.preventDefault();
    const book = {
      title: $('#fTitle').value.trim(),
      author: $('#fAuthor').value.trim(),
      cover: $('#fCover').value.trim(),
      memo: $('#fMemo').value.trim()
    };
    if(!book.title){ toast('제목을 입력해 주세요.'); return; }
    let rank = parseInt($('#fRank').value, 10);

    if(editingIndex !== null){
      state.books[editingIndex] = book;
      if(!isNaN(rank)){
        rank = Math.min(Math.max(rank,1), state.books.length);
        if(rank - 1 !== editingIndex){
          const [b] = state.books.splice(editingIndex,1);
          state.books.splice(rank-1, 0, b);
        }
      }
      toast('수정했습니다.');
    }else{
      const max = state.books.length + 1;
      if(isNaN(rank)) rank = max;
      rank = Math.min(Math.max(rank,1), max);
      state.books.splice(rank-1, 0, book);   // 해당 순위 뒤 책들은 자동으로 한 칸씩 밀림
      toast(`${rank}번에 추가했습니다.`);
    }
    modal.close();
    renderAll();
  });

  // ===== 시작일 =====
  $('#startDate').addEventListener('change', e => {
    if(e.target.value){ state.startDate = e.target.value; renderAll(); toast('시작일을 변경했습니다.'); }
  });

  // ===== 백업 / 불러오기 =====
  $('#exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const d = new Date();
    a.download = `책365_백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('백업 파일을 내려받았습니다.');
  });
  $('#importBtn').addEventListener('click', () => $('#importFile').click());
  $('#importFile').addEventListener('change', e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => {
      try{
        const data = JSON.parse(r.result);
        if(!Array.isArray(data.books)) throw new Error('형식 오류');
        if(!confirm(`백업 파일의 책 ${data.books.length}권을 불러올까요?\n현재 리스트는 대체됩니다.`)) return;
        state = Object.assign({books:[], startDate: state.startDate}, data);
        renderAll();
        $('#startDate').value = state.startDate;
        toast('불러왔습니다.');
      }catch(err){ toast('파일을 읽을 수 없습니다. 올바른 백업 파일인지 확인해 주세요.'); }
      e.target.value = '';
    };
    r.readAsText(f);
  });

  // ===== 신간 추천 프롬프트 =====
  const promptModal = $('#promptModal');
  function buildPrompt(){
    const y = new Date().getFullYear();
    const count = $('#pCount').value;
    const extra = $('#pExtra').value.trim();
    const listTxt = state.books.map((b,i) => {
      let line = `${i+1}. 《${b.title}》`;
      if(b.author) line += ` — ${b.author}`;
      if(b.memo) line += ` (메모: ${b.memo})`;
      return line;
    }).join('\n');

    return `아래는 내가 평생 읽은 책 중에서 다시 읽고 싶은 책들을 간추린 리스트야. 이 리스트를 보면 내 독서 취향을 알 수 있을 거야.

[나의 책 리스트]
${listTxt}

이 리스트와 비슷한 결의 책 중에서, 최근 5년(${y-5}년~${y}년) 안에 출간된 신간을 ${count}권 추천해 줘.

추천할 때 지켜줬으면 하는 것:
1. 먼저 내 리스트에서 읽어낸 취향과 관심사를 2~3문장으로 요약해 줘.
2. 각 책마다 제목, 저자, 출간 연도, 추천 이유를 알려 줘.
3. 추천 이유에는 내 리스트의 어떤 책과 결이 비슷한지 구체적으로 짚어 줘.
4. 한국어로 읽을 수 있는 책(국내서 또는 번역 출간된 책)이면 표시해 줘.
5. 내 리스트에 이미 있는 책은 제외해 줘.${extra ? `\n6. 추가 요청: ${extra}` : ''}`;
  }
  function refreshPrompt(){ $('#pText').value = buildPrompt(); }
  $('#promptBtn').addEventListener('click', () => {
    if(state.books.length === 0){ toast('먼저 리스트에 책을 등록해 주세요.'); return; }
    refreshPrompt();
    promptModal.showModal();
  });
  $('#pCount').addEventListener('change', refreshPrompt);
  $('#pExtra').addEventListener('input', refreshPrompt);
  $('#pClose').addEventListener('click', () => promptModal.close());
  $('#pCopy').addEventListener('click', () => {
    const ta = $('#pText');
    const done = () => toast('프롬프트를 복사했습니다. AI 채팅에 붙여넣으세요!');
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ta.value).then(done).catch(() => {
        ta.select(); document.execCommand('copy'); done();
      });
    }else{
      ta.select(); document.execCommand('copy'); done();
    }
  });

  // ===== 시작 =====
  load();
  $('#startDate').value = state.startDate;
  renderAll();
})();
</script>
</body>
</html>
