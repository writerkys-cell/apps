<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>into</title>
<style>
  :root{
    --bg:#faf8f3; --ink:#2c2a26; --dim:#8a857c; --line:#e6e1d6;
    --card:#ffffff; --accent:#7a6248; --accent-ink:#fff; --soft:#f1ede4;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Iowan Old Style','Apple SD Gothic Neo','Noto Serif KR',serif;
    line-height:1.75; font-size:17px;
  }
  #app{max-width:700px; margin:0 auto; padding:28px 20px 120px;}

  /* top bar */
  header{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:36px;}
  header h1{font-size:18px; font-weight:600; letter-spacing:.08em; margin-right:auto;}
  select,button,input[type=text]{font-family:inherit; font-size:14px; color:var(--ink);}
  select{border:1px solid var(--line); background:var(--card); border-radius:8px; padding:6px 8px; max-width:180px;}
  .tbtn{border:none; background:none; color:var(--dim); cursor:pointer; padding:6px 4px; font-size:13px;}
  .tbtn:hover{color:var(--ink);}

  /* question card */
  #qcard{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:22px 24px; margin-bottom:26px; cursor:pointer;
    box-shadow:0 2px 10px rgba(60,50,30,.05); user-select:none;
  }
  #qcard .qmeta{font-size:12px; color:var(--dim); letter-spacing:.06em; margin-bottom:8px;}
  #qcard .qtext{font-size:19px; line-height:1.6;}
  #qcard .qhint{font-size:12px; color:var(--dim); margin-top:12px; text-align:right;}

  .stagelabel{font-size:13px; color:var(--dim); letter-spacing:.05em; margin-bottom:10px;}

  /* the ever-present writing box */
  #editor{
    width:100%; min-height:42vh; border:none; background:transparent; resize:none;
    font-family:inherit; font-size:17px; line-height:1.9; color:var(--ink); outline:none;
  }
  #editor::placeholder{color:#c4bdaf;}

  /* actions */
  .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; padding-top:16px; border-top:1px solid var(--line);}
  .btn{
    border:1px solid var(--line); background:var(--card); border-radius:10px;
    padding:9px 16px; cursor:pointer; font-size:14px;
  }
  .btn:hover{border-color:var(--accent);}
  .btn.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
  .btn:disabled{opacity:.4; cursor:default;}

  /* paste box */
  #pastewrap{margin-top:22px;}
  #pastebox{
    width:100%; min-height:120px; border:1px dashed var(--line); border-radius:12px;
    background:var(--soft); padding:14px; font-family:inherit; font-size:15px;
    line-height:1.7; outline:none; resize:vertical; color:var(--ink);
  }
  #pastebox::placeholder{color:#b6ae9e;}

  /* history */
  #history{margin-top:56px;}
  #history summary{cursor:pointer; color:var(--dim); font-size:14px; letter-spacing:.05em;}
  .entry{margin-top:22px; padding-top:18px; border-top:1px solid var(--line);}
  .entry .etitle{font-size:13px; color:var(--dim); margin-bottom:8px; letter-spacing:.05em;}
  .entry .etext{white-space:pre-wrap; font-size:15.5px;}
  .entry .eq{font-size:13.5px; color:var(--dim); white-space:pre-wrap; margin-bottom:10px;}

  /* modal */
  #overlay{
    position:fixed; inset:0; background:rgba(40,35,25,.35); display:none;
    align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto; z-index:50;
  }
  #overlay.show{display:flex;}
  #modal{
    background:var(--card); border-radius:16px; padding:26px; max-width:640px; width:100%;
    box-shadow:0 10px 40px rgba(0,0,0,.15);
  }
  #modal h2{font-size:16px; margin-bottom:14px;}
  #modal label{font-size:13px; color:var(--dim); display:block; margin:14px 0 6px;}
  #modal textarea{
    width:100%; min-height:130px; border:1px solid var(--line); border-radius:10px;
    padding:12px; font-family:inherit; font-size:14px; line-height:1.7; resize:vertical; outline:none;
  }
  #modal .hint{font-size:12.5px; color:var(--dim); margin-top:10px;}
  #modal .actions{border:none; padding-top:6px;}

  /* toast */
  #toast{
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#faf8f3; padding:10px 18px; border-radius:10px;
    font-size:14px; opacity:0; transition:all .25s; pointer-events:none; z-index:99;
    max-width:90vw; text-align:center;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>into</h1>
    <select id="projSel" title="프로젝트"></select>
    <button class="tbtn" id="newProjBtn" title="새 프로젝트">+ 새 글</button>
    <button class="tbtn" id="promptBtn">프롬프트</button>
    <button class="tbtn" id="exportBtn">내보내기</button>
    <button class="tbtn" id="importBtn">가져오기</button>
    <button class="tbtn" id="delProjBtn">삭제</button>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none">
  </header>

  <div id="qcard" style="display:none">
    <div class="qmeta" id="qmeta"></div>
    <div class="qtext" id="qtext"></div>
    <div class="qhint">카드를 누르면 다른 문장이 떠오릅니다</div>
  </div>

  <div class="stagelabel" id="stagelabel"></div>
  <textarea id="editor"></textarea>

  <div class="actions" id="actionbar"></div>

  <div id="pastewrap" style="display:none">
    <textarea id="pastebox" placeholder="AI에게 받은 문장들을 여기에 붙여넣으세요. 한 줄에 하나씩이면 충분해요."></textarea>
    <div class="actions" style="border:none; padding-top:10px">
      <button class="btn primary" id="startRoundBtn">문장 세트 입력 — 라운드 시작</button>
    </div>
  </div>

  <details id="history" style="display:none">
    <summary>지금까지의 글</summary>
    <div id="historyBody"></div>
  </details>
</div>

<div id="overlay">
  <div id="modal">
    <h2>프롬프트 수정</h2>
    <label>문장 요청 프롬프트 — 라운드마다 사용</label>
    <textarea id="askPromptEdit"></textarea>
    <label>최종 가이드 프롬프트 — 만족했을 때 사용</label>
    <textarea id="guidePromptEdit"></textarea>
    <div class="hint">{글} 자리에 지금까지 쓴 글 전체가 자동으로 들어갑니다.</div>
    <div class="actions">
      <button class="btn primary" id="savePromptsBtn">저장</button>
      <button class="btn" id="resetPromptsBtn">기본값으로</button>
      <button class="btn" id="closeModalBtn">닫기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

const STORE_KEY = 'geulsokeuro-v1';

const DEFAULT_ASK_PROMPT =
`아래는 내가 쓰려는 글을 위해 지금까지 적어온 생각들이다. 전체를 천천히 읽고, 이 이야기를 더 깊고 구체적으로 만들어줄 문장 7개를 던져달라.

- 내가 적지 않았으나 충분히 개연성이 있는 문장을 제시할 것.
- 내가 두려워서 적지 않았을 수 있는 부분을 지적하고 그곳을 건드릴 것.
- 전혀 뜻밖의 지점을 건드리는 문장을 사용할 것.
- 각 문장은 한 줄로, 번호를 붙여서.

---

{글}`;

const DEFAULT_GUIDE_PROMPT =
`아래는 한 편의 글을 준비하며 질문에 답해온 기록 전체다. 처음의 생각부터 마지막 라운드의 답까지 그대로 읽고, 이 재료들로 실제 글을 쓸 수 있도록 글쓰기 가이드를 만들어달라.

- 이 이야기의 중심이 무엇인지 짚어줄 것.
- 글의 구조(시작, 전개, 끝)를 제안할 것.
- 기록 속에서 살릴 만한 문장과 장면을 골라줄 것.
- 아직 비어 있어 더 써야 할 부분을 알려줄 것.

---

{글}`;

let state = null;

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) state = JSON.parse(raw);
  }catch(e){ state = null; }
  if(!state){
    state = {
      projects: [],
      currentId: null,
      prompts: { ask: DEFAULT_ASK_PROMPT, guide: DEFAULT_GUIDE_PROMPT },
      lastAutoExport: null
    };
  }
  if(!state.prompts) state.prompts = { ask: DEFAULT_ASK_PROMPT, guide: DEFAULT_GUIDE_PROMPT };
}

function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function proj(){
  return state.projects.find(p => p.id === state.currentId) || null;
}

function newProject(name){
  const p = {
    id: 'p' + Date.now(),
    name: name,
    createdAt: todayStr(),
    phase: 'initial',      // initial → await → round → await → ...
    entries: [],           // {type:'initial',text} | {type:'answer',round,questions,text}
    questions: [],
    qIndex: 0,
    round: 0,
    draft: ''
  };
  state.projects.push(p);
  state.currentId = p.id;
  save();
}

/* ---------- text assembly ---------- */

function compiledText(p){
  // AI가 제시한 문장은 참고용일 뿐, 프롬프트에는 내가 실제로 쓴 문장만 담는다.
  const parts = [];
  for(const e of p.entries){
    if(e.type === 'initial'){
      parts.push('[처음의 생각]\n' + e.text);
    }else{
      parts.push('[라운드 ' + e.round + '에서 쓴 문장]\n' + e.text);
    }
  }
  return parts.join('\n\n');
}

function buildPrompt(template, p){
  const body = compiledText(p);
  if(template.indexOf('{글}') !== -1) return template.split('{글}').join(body);
  return template + '\n\n---\n\n' + body;
}

/* ---------- clipboard & toast ---------- */

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function copyText(text, msg){
  const done = () => toast(msg || '복사했습니다. AI에게 붙여넣으세요.');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  }else{
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  done();
}

/* ---------- export / import ---------- */

function exportJSON(auto){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'into-백업-' + todayStr() + (auto ? '-자동' : '') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

function autoExportIfNeeded(){
  if(state.projects.length === 0) return;
  const hasContent = state.projects.some(p => p.entries.length > 0 || (p.draft && p.draft.trim()));
  if(!hasContent) return;
  if(state.lastAutoExport === todayStr()) return;
  state.lastAutoExport = todayStr();
  save();
  exportJSON(true);
  toast('오늘의 자동 백업을 저장했습니다.');
}

/* ---------- sentence parsing ---------- */

function parseQuestions(raw){
  return raw.split('\n')
    .map(s => s.replace(/^\s*(?:\d+\s*[.)]|[-•*])\s*/, '').trim())
    .filter(s => s.length > 1);
}

/* ---------- rendering ---------- */

function el(id){ return document.getElementById(id); }

function render(){
  const sel = el('projSel');
  sel.innerHTML = '';
  for(const p of state.projects){
    const o = document.createElement('option');
    o.value = p.id; o.textContent = p.name;
    if(p.id === state.currentId) o.selected = true;
    sel.appendChild(o);
  }
  sel.style.display = state.projects.length ? '' : 'none';
  el('delProjBtn').style.display = state.projects.length ? '' : 'none';

  const p = proj();
  const qcard = el('qcard');
  const editor = el('editor');
  const bar = el('actionbar');
  const pastewrap = el('pastewrap');
  const history = el('history');
  bar.innerHTML = '';

  if(!p){
    qcard.style.display = 'none';
    pastewrap.style.display = 'none';
    history.style.display = 'none';
    el('stagelabel').textContent = '';
    editor.style.display = 'none';
    addBtn(bar, '새 글 시작하기', true, () => promptNewProject());
    return;
  }

  editor.style.display = '';
  editor.value = p.draft || '';

  if(p.phase === 'initial'){
    qcard.style.display = 'none';
    pastewrap.style.display = 'none';
    el('stagelabel').textContent = '무엇을 쓰려고 하나요? 떠오르는 것을 자유롭게 적어보세요. 단어만 나열해도 좋아요.';
    editor.placeholder = '여기에 쓰세요…';
    addBtn(bar, '생각 저장하고 문장 받으러 가기', true, saveInitial);
  }
  else if(p.phase === 'await'){
    qcard.style.display = 'none';
    pastewrap.style.display = '';
    el('startRoundBtn').textContent = '문장 세트 입력 — 라운드 ' + (p.round + 1) + ' 시작';
    el('stagelabel').textContent = '문장 요청 프롬프트를 복사해 AI에게 붙여넣고, 받은 문장들을 아래에 넣어주세요.';
    editor.style.display = 'none';
    addBtn(bar, '문장 요청 프롬프트 복사', true, () => copyText(buildPrompt(state.prompts.ask, p)));
    if(p.entries.length > 0){
      addBtn(bar, '최종 가이드 프롬프트 복사', false, () => copyText(buildPrompt(state.prompts.guide, p), '가이드 프롬프트를 복사했습니다.'));
    }
  }
  else if(p.phase === 'round'){
    qcard.style.display = '';
    pastewrap.style.display = 'none';
    el('qmeta').textContent = '라운드 ' + p.round + ' · 문장 ' + (p.qIndex + 1) + ' / ' + p.questions.length;
    el('qtext').textContent = p.questions[p.qIndex] || '';
    el('stagelabel').textContent = '이 문장을 보고, 내가 쓸 문장을 이어서 쓰세요. 문장 자체는 저장되지 않아요.';
    editor.placeholder = '이 문장이 건드린 곳에서…';
    addBtn(bar, '라운드 마치기 — 내 문장 저장', true, finishRound);
    addBtn(bar, '최종 가이드 프롬프트 복사', false, () => copyText(buildPrompt(state.prompts.guide, p), '가이드 프롬프트를 복사했습니다.'));
  }

  renderHistory(p);
}

function addBtn(bar, label, primary, fn){
  const b = document.createElement('button');
  b.className = 'btn' + (primary ? ' primary' : '');
  b.textContent = label;
  b.onclick = fn;
  bar.appendChild(b);
}

function renderHistory(p){
  const history = el('history');
  const body = el('historyBody');
  if(p.entries.length === 0){ history.style.display = 'none'; return; }
  history.style.display = '';
  body.innerHTML = '';
  for(const e of p.entries){
    const d = document.createElement('div');
    d.className = 'entry';
    if(e.type === 'initial'){
      d.innerHTML = '<div class="etitle">처음의 생각</div>';
    }else{
      d.innerHTML = '<div class="etitle">라운드 ' + e.round + ' · AI가 제시한 문장 (참고용, 프롬프트에는 포함되지 않음)</div>' +
        '<div class="eq"></div>' +
        '<div class="etitle" style="margin-top:12px">내가 쓴 문장</div>';
      d.querySelector('.eq').textContent = e.questions.map((q,i) => (i+1) + '. ' + q).join('\n');
    }
    const t = document.createElement('div');
    t.className = 'etext';
    t.textContent = e.text;
    d.appendChild(t);
    body.appendChild(d);
  }
}

/* ---------- flow actions ---------- */

function promptNewProject(){
  const name = prompt('이 글을 뭐라고 부를까요?', '이름 없는 글');
  if(name === null) return;
  newProject(name.trim() || '이름 없는 글');
  render();
}

function saveInitial(){
  const p = proj();
  const text = el('editor').value.trim();
  if(!text){ toast('아직 아무것도 쓰지 않았어요.'); return; }
  p.entries.push({ type:'initial', text: text });
  p.draft = '';
  p.phase = 'await';
  save();
  render();
  copyText(buildPrompt(state.prompts.ask, p), '생각을 저장하고 문장 요청 프롬프트를 복사했습니다. AI에게 붙여넣으세요.');
}

function startRound(){
  const p = proj();
  const qs = parseQuestions(el('pastebox').value);
  if(qs.length === 0){ toast('문장을 붙여넣어 주세요.'); return; }
  p.questions = qs;
  p.qIndex = Math.floor(Math.random() * qs.length);
  p.round += 1;
  p.phase = 'round';
  p.draft = '';
  el('pastebox').value = '';
  save();
  render();
}

function shuffleQuestion(){
  const p = proj();
  if(!p || p.phase !== 'round' || p.questions.length < 2) return;
  let next = p.qIndex;
  while(next === p.qIndex){
    next = Math.floor(Math.random() * p.questions.length);
  }
  p.qIndex = next;
  save();
  el('qmeta').textContent = '라운드 ' + p.round + ' · 질문 ' + (p.qIndex + 1) + ' / ' + p.questions.length;
  el('qtext').textContent = p.questions[p.qIndex];
}

function finishRound(){
  const p = proj();
  const text = el('editor').value.trim();
  if(!text){ toast('이번 라운드에 쓴 문장이 아직 비어 있어요.'); return; }
  p.entries.push({ type:'answer', round: p.round, questions: p.questions.slice(), text: text });
  p.draft = '';
  p.questions = [];
  p.phase = 'await';
  save();
  render();
  copyText(buildPrompt(state.prompts.ask, p), '내가 쓴 문장을 저장했습니다. 다음 문장 요청 프롬프트를 복사했어요.');
}

/* ---------- prompts modal ---------- */

function openModal(){
  el('askPromptEdit').value = state.prompts.ask;
  el('guidePromptEdit').value = state.prompts.guide;
  el('overlay').classList.add('show');
}
function closeModal(){ el('overlay').classList.remove('show'); }

/* ---------- wiring ---------- */

function init(){
  load();

  el('projSel').onchange = e => { state.currentId = e.target.value; save(); render(); };
  el('newProjBtn').onclick = promptNewProject;
  el('delProjBtn').onclick = () => {
    const p = proj(); if(!p) return;
    if(!confirm('"' + p.name + '"을(를) 삭제할까요? 되돌릴 수 없어요.')) return;
    state.projects = state.projects.filter(x => x.id !== p.id);
    state.currentId = state.projects.length ? state.projects[0].id : null;
    save(); render();
  };
  el('exportBtn').onclick = () => { exportJSON(false); toast('JSON으로 내보냈습니다.'); };
  el('importBtn').onclick = () => el('importFile').click();
  el('importFile').onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => {
      try{
        const data = JSON.parse(r.result);
        if(!data || !Array.isArray(data.projects)) throw new Error('bad');
        state = data;
        if(!state.prompts) state.prompts = { ask: DEFAULT_ASK_PROMPT, guide: DEFAULT_GUIDE_PROMPT };
        save(); render();
        toast('가져왔습니다.');
      }catch(err){ toast('파일을 읽을 수 없어요. 이 앱에서 내보낸 JSON인지 확인해 주세요.'); }
    };
    r.readAsText(f);
    e.target.value = '';
  };

  el('promptBtn').onclick = openModal;
  el('closeModalBtn').onclick = closeModal;
  el('savePromptsBtn').onclick = () => {
    state.prompts.ask = el('askPromptEdit').value;
    state.prompts.guide = el('guidePromptEdit').value;
    save(); closeModal(); toast('프롬프트를 저장했습니다.');
  };
  el('resetPromptsBtn').onclick = () => {
    el('askPromptEdit').value = DEFAULT_ASK_PROMPT;
    el('guidePromptEdit').value = DEFAULT_GUIDE_PROMPT;
  };
  el('overlay').onclick = e => { if(e.target === el('overlay')) closeModal(); };

  el('qcard').onclick = shuffleQuestion;
  el('startRoundBtn').onclick = startRound;

  const editor = el('editor');
  editor.addEventListener('input', () => {
    const p = proj(); if(!p) return;
    p.draft = editor.value;
    save();
    editor.style.height = 'auto';
    editor.style.height = Math.max(editor.scrollHeight, window.innerHeight * 0.42) + 'px';
  });

  render();
  autoExportIfNeeded();
}

init();
</script>
</body>
</html>
