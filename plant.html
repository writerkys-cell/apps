<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪴 화분 물주기 기록</title>
<style>
  :root{
    --green:#3a7d44; --green-dark:#2c5e34; --green-light:#e8f3ea;
    --bg:#f6f8f4; --card:#ffffff; --text:#26332a; --muted:#7a8a7e;
    --border:#dfe8e0; --danger:#c0564f; --amber:#b98a2e;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Apple SD Gothic Neo","Noto Sans KR",-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh;}
  header{background:var(--green); color:#fff; padding:20px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
  header h1{font-size:1.35rem;}
  .header-btns{display:flex; gap:8px;}
  main{max-width:900px; margin:0 auto; padding:24px 16px 60px;}

  .btn{border:none; border-radius:8px; padding:9px 14px; font-size:.9rem; cursor:pointer; font-weight:600; transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn-primary{background:var(--green); color:#fff;}
  .btn-light{background:rgba(255,255,255,.2); color:#fff; border:1px solid rgba(255,255,255,.5);}
  .btn-outline{background:#fff; color:var(--green); border:1.5px solid var(--green);}
  .btn-danger{background:none; color:var(--danger); border:none; font-size:.8rem; padding:4px 6px;}
  .btn-edit{background:none; color:var(--green); border:none; font-size:.8rem; padding:4px 6px;}
  .edit-row{display:flex; gap:8px; flex-wrap:wrap; flex:1;}
  .edit-row input{flex:1; min-width:130px;}
  .btn-sm{padding:6px 10px; font-size:.82rem;}

  .card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.04);}

  /* 화분 추가 폼 */
  .add-form{display:flex; gap:8px; flex-wrap:wrap;}
  .add-form input{flex:1; min-width:160px;}
  input,select,textarea{border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:.92rem; font-family:inherit; background:#fff; color:var(--text);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--green); outline-offset:0; border-color:transparent;}
  textarea{width:100%; resize:vertical; min-height:60px;}

  /* 화분 카드 */
  .plant-header{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; flex-wrap:wrap;}
  .plant-name{font-size:1.15rem; font-weight:700; color:var(--green-dark);}
  .plant-species{font-size:.85rem; color:var(--muted); margin-left:6px;}
  .plant-stats{display:flex; gap:16px; flex-wrap:wrap; margin:10px 0 4px; font-size:.85rem; color:var(--muted);}
  .plant-stats b{color:var(--text);}
  .stat-warn{color:var(--amber); font-weight:700;}

  /* 물주기 기록 폼 */
  .log-form{background:var(--green-light); border-radius:10px; padding:12px; margin-top:12px; display:none;}
  .log-form.open{display:block;}
  .log-form .row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
  .log-form label{font-size:.8rem; color:var(--muted); display:block; margin-bottom:3px;}

  /* 기록 목록 */
  .logs{margin-top:12px; display:none;}
  .logs.open{display:block;}
  .log-item{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; padding:9px 4px; border-top:1px dashed var(--border); font-size:.88rem;}
  .log-date{font-weight:700; white-space:nowrap;}
  .log-cond{display:inline-block; border-radius:20px; padding:1px 9px; font-size:.76rem; font-weight:600; margin-left:6px;}
  .cond-좋음{background:#e0f0e2; color:var(--green-dark);}
  .cond-보통{background:#f5eeda; color:var(--amber);}
  .cond-나쁨{background:#f7e2e0; color:var(--danger);}
  .log-note{color:var(--muted); margin-top:2px;}
  .interval-tag{font-size:.72rem; color:var(--muted); white-space:nowrap;}

  .plant-actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .empty{text-align:center; color:var(--muted); padding:40px 0; font-size:.95rem;}

  /* 모달 */
  .modal-bg{display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:10; padding:20px; overflow-y:auto;}
  .modal-bg.open{display:flex; align-items:flex-start; justify-content:center;}
  .modal{background:#fff; border-radius:14px; max-width:640px; width:100%; padding:22px; margin-top:5vh;}
  .modal h2{font-size:1.05rem; margin-bottom:10px; color:var(--green-dark);}
  .modal textarea{min-height:320px; font-size:.83rem; line-height:1.5;}
  .modal-btns{display:flex; gap:8px; justify-content:flex-end; margin-top:12px;}
  .copy-ok{color:var(--green); font-size:.85rem; align-self:center; margin-right:auto; display:none;}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:10px 18px; border-radius:24px; font-size:.85rem; opacity:0; transition:opacity .3s; pointer-events:none; z-index:20;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>🪴 화분 물주기 기록</h1>
  <div class="header-btns">
    <button class="btn btn-light btn-sm" onclick="exportData()">데이터 내보내기</button>
    <button class="btn btn-light btn-sm" onclick="document.getElementById('importFile').click()">데이터 불러오기</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
  </div>
</header>

<main>
  <div class="card">
    <div class="add-form">
      <input id="newName" placeholder="화분 이름 (예: 몬스테라)" onkeydown="if(event.key==='Enter')addPlant()">
      <input id="newSpecies" placeholder="식물 종류 (선택)" onkeydown="if(event.key==='Enter')addPlant()">
      <button class="btn btn-primary" onclick="addPlant()">+ 화분 추가</button>
    </div>
  </div>
  <div id="plantList"></div>
</main>

<!-- AI 프롬프트 모달 -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>🤖 AI 조언용 프롬프트</h2>
    <p style="font-size:.83rem; color:var(--muted); margin-bottom:10px;">
      아래 내용을 복사해서 Claude, ChatGPT 등 AI에게 붙여넣으면 물주기 조언을 받을 수 있어요.
    </p>
    <textarea id="promptText" readonly></textarea>
    <div class="modal-btns">
      <span class="copy-ok" id="copyOk">✓ 복사되었습니다!</span>
      <button class="btn btn-outline" onclick="closeModal()">닫기</button>
      <button class="btn btn-primary" onclick="copyPrompt()">📋 프롬프트 복사</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'plantWateringData';
let data = { plants: [] };
let editingPlantId = null;
let editingLogId = null;
const openLogs = new Set();

/* ---------- 저장 / 불러오기 ---------- */
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) data = JSON.parse(raw);
  }catch(e){ data = { plants: [] }; }
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function exportData(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '화분물주기_백업_' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('JSON 파일로 내보냈습니다');
}
function importData(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const imported = JSON.parse(e.target.result);
      if(!imported.plants || !Array.isArray(imported.plants)) throw new Error();
      if(data.plants.length && !confirm('현재 데이터를 불러온 데이터로 교체할까요?')) return;
      data = imported;
      save(); render();
      toast('데이터를 불러왔습니다');
    }catch(err){ alert('올바른 백업 파일이 아닙니다.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

/* ---------- 유틸 ---------- */
function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function daysBetween(a, b){
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function fmtDate(s){
  const d = new Date(s);
  const w = ['일','월','화','수','목','금','토'][d.getDay()];
  return s + ' (' + w + ')';
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

/* ---------- 화분 ---------- */
function addPlant(){
  const name = document.getElementById('newName').value.trim();
  if(!name){ toast('화분 이름을 입력하세요'); return; }
  const species = document.getElementById('newSpecies').value.trim();
  data.plants.push({ id: Date.now(), name, species, logs: [] });
  document.getElementById('newName').value = '';
  document.getElementById('newSpecies').value = '';
  save(); render();
}
function deletePlant(id){
  const p = data.plants.find(p=>p.id===id);
  if(!confirm('"' + p.name + '" 화분과 모든 기록을 삭제할까요?')) return;
  data.plants = data.plants.filter(p=>p.id!==id);
  save(); render();
}
function startEditPlant(id){
  editingPlantId = id; editingLogId = null;
  render();
}
function savePlantEdit(id){
  const p = data.plants.find(p=>p.id===id);
  const name = document.getElementById('editname-'+id).value.trim();
  if(!name){ toast('화분 이름을 입력하세요'); return; }
  p.name = name;
  p.species = document.getElementById('editspecies-'+id).value.trim();
  editingPlantId = null;
  save(); render();
  toast('화분 정보를 수정했습니다');
}
function cancelEdits(){
  editingPlantId = null; editingLogId = null;
  render();
}

/* ---------- 물주기 기록 ---------- */
function toggleLogForm(id){
  document.getElementById('logform-'+id).classList.toggle('open');
}
function toggleLogs(id){
  if(openLogs.has(id)) openLogs.delete(id); else openLogs.add(id);
  render();
}
function addLog(id){
  const p = data.plants.find(p=>p.id===id);
  const date = document.getElementById('date-'+id).value;
  const condition = document.getElementById('cond-'+id).value;
  const note = document.getElementById('note-'+id).value.trim();
  if(!date){ toast('날짜를 선택하세요'); return; }
  p.logs.push({ id: Date.now(), date, condition, note });
  p.logs.sort((a,b)=> a.date.localeCompare(b.date));
  openLogs.add(id);
  save(); render();
  toast('물주기를 기록했습니다 💧');
}
function deleteLog(pid, lid){
  const p = data.plants.find(p=>p.id===pid);
  p.logs = p.logs.filter(l=>l.id!==lid);
  save(); render();
}
function startEditLog(pid, lid){
  editingLogId = lid; editingPlantId = null;
  openLogs.add(pid);
  render();
}
function saveLogEdit(pid, lid){
  const p = data.plants.find(p=>p.id===pid);
  const l = p.logs.find(l=>l.id===lid);
  const date = document.getElementById('editdate-'+lid).value;
  if(!date){ toast('날짜를 선택하세요'); return; }
  l.date = date;
  l.condition = document.getElementById('editcond-'+lid).value;
  l.note = document.getElementById('editnote-'+lid).value.trim();
  p.logs.sort((a,b)=> a.date.localeCompare(b.date));
  editingLogId = null;
  save(); render();
  toast('기록을 수정했습니다');
}

/* ---------- 통계 ---------- */
function stats(p){
  if(p.logs.length === 0) return null;
  const dates = p.logs.map(l=>l.date);
  const last = dates[dates.length-1];
  const sinceLast = daysBetween(last, todayStr());
  let avg = null;
  if(dates.length >= 2){
    let total = 0;
    for(let i=1;i<dates.length;i++) total += daysBetween(dates[i-1], dates[i]);
    avg = (total/(dates.length-1)).toFixed(1);
  }
  return { last, sinceLast, avg, count: p.logs.length };
}

/* ---------- AI 프롬프트 ---------- */
function buildPrompt(id){
  const p = data.plants.find(p=>p.id===id);
  const s = stats(p);
  let t = '나는 화분을 키우면서 물 준 날짜와 그날의 화분 상태를 기록하고 있어. 아래 기록을 보고 물주기 관리를 잘 하고 있는지 조언해줘.\n\n';
  t += '## 화분 정보\n';
  t += '- 이름: ' + p.name + '\n';
  if(p.species) t += '- 식물 종류: ' + p.species + '\n';
  t += '- 오늘 날짜: ' + todayStr() + '\n';
  if(s){
    t += '- 총 물주기 횟수: ' + s.count + '회\n';
    if(s.avg) t += '- 평균 물주기 간격: 약 ' + s.avg + '일\n';
    t += '- 마지막 물 준 날: ' + s.last + ' (' + s.sinceLast + '일 전)\n';
  }
  t += '\n## 물주기 기록 (날짜순)\n';
  p.logs.forEach((l, i) => {
    let line = (i+1) + '. ' + l.date + ' | 상태: ' + l.condition;
    if(i > 0) line += ' | 이전 물주기로부터 ' + daysBetween(p.logs[i-1].date, l.date) + '일 경과';
    if(l.note) line += ' | 메모: ' + l.note;
    t += line + '\n';
  });
  t += '\n## 질문\n';
  t += '1. 기록된 물주기 간격이 이 식물에게 적절한지 평가해줘.\n';
  t += '2. 상태 변화(좋음/보통/나쁨)와 메모 내용을 볼 때, 물을 너무 자주 주거나 너무 뜸하게 주는 징후가 있는지 알려줘.\n';
  t += '3. 앞으로 며칠 간격으로 물을 주면 좋을지, 다음 물주기 추천 날짜와 함께 제안해줘.\n';
  t += '4. 물주기 외에 상태 개선을 위해 확인해볼 것(빛, 통풍, 분갈이 등)이 있다면 알려줘.\n';
  document.getElementById('promptText').value = t;
  document.getElementById('copyOk').style.display = 'none';
  document.getElementById('modalBg').classList.add('open');
}
function copyPrompt(){
  const ta = document.getElementById('promptText');
  ta.select();
  navigator.clipboard.writeText(ta.value)
    .then(()=>{ document.getElementById('copyOk').style.display='inline'; })
    .catch(()=>{ document.execCommand('copy'); document.getElementById('copyOk').style.display='inline'; });
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
}

/* ---------- 렌더링 ---------- */
function render(){
  const list = document.getElementById('plantList');
  if(data.plants.length === 0){
    list.innerHTML = '<div class="empty">아직 등록된 화분이 없어요.<br>위에서 첫 화분을 추가해 보세요 🌱</div>';
    return;
  }
  list.innerHTML = data.plants.map(p => {
    const s = stats(p);
    let statsHtml = '';
    if(s){
      const warn = s.avg && s.sinceLast > Math.ceil(parseFloat(s.avg)) ? ' <span class="stat-warn">💧 물 줄 때가 지났을 수 있어요!</span>' : '';
      statsHtml = '<div class="plant-stats">'
        + '<span>마지막 물주기 <b>' + s.sinceLast + '일 전</b></span>'
        + (s.avg ? '<span>평균 간격 <b>' + s.avg + '일</b></span>' : '')
        + '<span>총 <b>' + s.count + '회</b></span>'
        + warn + '</div>';
    } else {
      statsHtml = '<div class="plant-stats"><span>아직 물주기 기록이 없어요</span></div>';
    }

    const logsHtml = p.logs.slice().reverse().map((l, ri) => {
      const idx = p.logs.length - 1 - ri;
      const interval = idx > 0 ? '<span class="interval-tag">+' + daysBetween(p.logs[idx-1].date, l.date) + '일</span>' : '';
      if(editingLogId === l.id){
        const conds = ['좋음','보통','나쁨'].map(c =>
          '<option value="' + c + '"' + (l.condition===c ? ' selected' : '') + '>' + c + '</option>').join('');
        return '<div class="log-item"><div style="flex:1">'
          + '<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px;">'
          + '<input type="date" id="editdate-' + l.id + '" value="' + l.date + '">'
          + '<select id="editcond-' + l.id + '">' + conds + '</select></div>'
          + '<textarea id="editnote-' + l.id + '" placeholder="상태 메모">' + esc(l.note || '') + '</textarea>'
          + '<div style="margin-top:6px; text-align:right;">'
          + '<button class="btn btn-outline btn-sm" onclick="cancelEdits()">취소</button> '
          + '<button class="btn btn-primary btn-sm" onclick="saveLogEdit(' + p.id + ',' + l.id + ')">저장</button>'
          + '</div></div></div>';
      }
      return '<div class="log-item"><div>'
        + '<span class="log-date">' + fmtDate(l.date) + '</span>'
        + '<span class="log-cond cond-' + l.condition + '">' + l.condition + '</span> ' + interval
        + (l.note ? '<div class="log-note">' + esc(l.note) + '</div>' : '')
        + '</div><div style="white-space:nowrap;">'
        + '<button class="btn-edit btn" onclick="startEditLog(' + p.id + ',' + l.id + ')">수정</button>'
        + '<button class="btn-danger btn" onclick="deleteLog(' + p.id + ',' + l.id + ')">삭제</button></div></div>';
    }).join('');

    let headerHtml;
    if(editingPlantId === p.id){
      headerHtml = '<div class="plant-header"><div class="edit-row">'
        + '<input id="editname-' + p.id + '" value="' + esc(p.name) + '" placeholder="화분 이름">'
        + '<input id="editspecies-' + p.id + '" value="' + esc(p.species || '') + '" placeholder="식물 종류 (선택)">'
        + '<button class="btn btn-primary btn-sm" onclick="savePlantEdit(' + p.id + ')">저장</button>'
        + '<button class="btn btn-outline btn-sm" onclick="cancelEdits()">취소</button>'
        + '</div></div>';
    } else {
      headerHtml = '<div class="plant-header"><div><span class="plant-name">' + esc(p.name) + '</span>'
        + (p.species ? '<span class="plant-species">' + esc(p.species) + '</span>' : '') + '</div>'
        + '<div style="white-space:nowrap;">'
        + '<button class="btn-edit btn" onclick="startEditPlant(' + p.id + ')">수정</button>'
        + '<button class="btn-danger btn" onclick="deletePlant(' + p.id + ')">화분 삭제</button></div></div>';
    }

    return '<div class="card">'
      + headerHtml
      + statsHtml
      + '<div class="plant-actions">'
      + '<button class="btn btn-primary btn-sm" onclick="toggleLogForm(' + p.id + ')">💧 물주기 기록</button>'
      + (p.logs.length ? '<button class="btn btn-outline btn-sm" onclick="toggleLogs(' + p.id + ')">' + (openLogs.has(p.id) ? '기록 접기' : '기록 보기') + '</button>' : '')
      + (p.logs.length ? '<button class="btn btn-outline btn-sm" onclick="buildPrompt(' + p.id + ')">🤖 AI 조언 프롬프트</button>' : '')
      + '</div>'
      + '<div class="log-form" id="logform-' + p.id + '">'
      +   '<div class="row">'
      +     '<div><label>물 준 날짜</label><input type="date" id="date-' + p.id + '" value="' + todayStr() + '"></div>'
      +     '<div><label>화분 상태</label><select id="cond-' + p.id + '">'
      +       '<option value="좋음">좋음 🌿</option><option value="보통">보통 🌱</option><option value="나쁨">나쁨 🥀</option>'
      +     '</select></div>'
      +   '</div>'
      +   '<label>상태 메모 (잎 색, 흙 상태, 새순 등)</label>'
      +   '<textarea id="note-' + p.id + '" placeholder="예: 잎 끝이 살짝 노랗게 변함, 흙은 아직 촉촉함"></textarea>'
      +   '<div style="margin-top:8px; text-align:right;"><button class="btn btn-primary btn-sm" onclick="addLog(' + p.id + ')">저장</button></div>'
      + '</div>'
      + '<div class="logs' + (openLogs.has(p.id) ? ' open' : '') + '" id="logs-' + p.id + '">' + logsHtml + '</div>'
      + '</div>';
  }).join('');
}

load();
