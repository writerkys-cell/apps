<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초고 750</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F1E8;
  --paper-deep:#ECE8DB;
  --ink:#26241F;
  --ink-soft:#6B665B;
  --line:#D8D2C2;
  --jjok:#3B4A6B;      /* 쪽빛 */
  --injoo:#B03A2E;     /* 인주 */
  --done:#5A6E4E;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Gowun Batang',serif;
  line-height:1.8;
}
button{font-family:'IBM Plex Sans KR',sans-serif;cursor:pointer}
:focus-visible{outline:2px solid var(--jjok);outline-offset:2px}

/* ── 상단 ── */
header{
  max-width:720px;margin:0 auto;padding:28px 24px 0;
  display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;
}
h1{
  font-size:1.05rem;font-weight:700;letter-spacing:.35em;
  color:var(--ink);white-space:nowrap;
}
h1 .num{color:var(--injoo);letter-spacing:.1em}
.spacer{flex:1}
nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select, .btn{
  font-family:'IBM Plex Sans KR',sans-serif;
  font-size:.82rem;
  background:transparent;color:var(--ink-soft);
  border:1px solid var(--line);border-radius:2px;
  padding:6px 12px;
}
select{max-width:180px}
.btn:hover{color:var(--ink);border-color:var(--ink-soft)}
.btn.active{color:var(--paper);background:var(--ink);border-color:var(--ink)}

/* ── 본문 ── */
main{max-width:720px;margin:0 auto;padding:20px 24px 80px}
.date-line{
  display:flex;align-items:center;gap:14px;
  margin:26px 0 6px;
}
.date-line .today{
  font-family:'IBM Plex Sans KR',sans-serif;
  font-size:.82rem;color:var(--ink-soft);letter-spacing:.08em;
}
.rule{flex:1;height:1px;background:var(--line)}

/* 노트 세 장 */
.pages{display:flex;gap:10px;align-items:flex-end}
.page{
  width:22px;height:30px;border:1.5px solid var(--ink-soft);
  border-radius:1px 4px 1px 1px;position:relative;overflow:hidden;
  background:var(--paper);
}
.page .fill{
  position:absolute;left:0;right:0;bottom:0;height:0%;
  background:var(--jjok);transition:height .35s ease;
}
.page.full .fill{background:var(--jjok)}
@media (prefers-reduced-motion:reduce){.page .fill{transition:none}}

/* 집필 영역 */
.sheet{
  margin-top:14px;background:#FBF9F2;
  border:1px solid var(--line);border-radius:2px;
  box-shadow:0 1px 0 rgba(38,36,31,.05);
}
textarea{
  width:100%;min-height:56vh;resize:vertical;
  background:transparent;border:none;outline:none;
  padding:28px 26px;
  font-family:'Gowun Batang',serif;font-size:1.02rem;line-height:2.05;
  color:var(--ink);
}
textarea::placeholder{color:#B5AF9E}
.status{
  display:flex;align-items:center;gap:14px;
  padding:12px 18px;border-top:1px solid var(--line);
  font-family:'IBM Plex Sans KR',sans-serif;font-size:.82rem;color:var(--ink-soft);
}
.count b{color:var(--ink);font-weight:500}
.finish{
  margin-left:auto;
  font-size:.85rem;padding:8px 20px;border-radius:2px;
  border:1px solid var(--line);background:transparent;color:#B5AF9E;
}
.finish.ready{
  border-color:var(--injoo);color:var(--injoo);background:transparent;
}
.finish.ready:hover{background:var(--injoo);color:var(--paper)}

/* 완료 낙관 */
.done-view{position:relative;padding:34px 30px 46px;white-space:pre-wrap;font-size:1.02rem;line-height:2.05}
.seal{
  position:absolute;top:18px;right:22px;
  width:52px;height:52px;border:2.5px solid var(--injoo);border-radius:6px;
  color:var(--injoo);display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:700;transform:rotate(-4deg);
  user-select:none;
}
.stamp-in{animation:stamp .3s ease-out}
@keyframes stamp{0%{transform:scale(1.6) rotate(-4deg);opacity:0}100%{transform:scale(1) rotate(-4deg);opacity:1}}
@media (prefers-reduced-motion:reduce){.stamp-in{animation:none}}
.done-msg{
  font-family:'IBM Plex Sans KR',sans-serif;font-size:.82rem;color:var(--done);
  padding:10px 18px;border-top:1px solid var(--line);
}

/* ── 보관함 ── */
.entry-list{list-style:none;margin-top:10px}
.entry-list li{border-bottom:1px solid var(--line)}
.entry-list button{
  width:100%;text-align:left;background:none;border:none;
  padding:14px 4px;display:flex;gap:14px;align-items:baseline;
  font-family:'IBM Plex Sans KR',sans-serif;font-size:.9rem;color:var(--ink);
}
.entry-list button:hover{background:var(--paper-deep)}
.entry-list .meta{color:var(--ink-soft);font-size:.78rem;margin-left:auto}
.empty{
  margin-top:40px;text-align:center;color:var(--ink-soft);
  font-family:'IBM Plex Sans KR',sans-serif;font-size:.85rem;line-height:2;
}

/* 열람 */
.read-head{display:flex;align-items:baseline;gap:12px;margin:26px 0 6px}
.read-head .d{font-family:'IBM Plex Sans KR',sans-serif;font-size:.85rem;color:var(--ink-soft)}
.back{background:none;border:none;color:var(--jjok);font-size:.82rem;padding:4px 0}
.notes{margin-top:22px}
.notes h3{
  font-family:'IBM Plex Sans KR',sans-serif;font-size:.78rem;font-weight:500;
  letter-spacing:.2em;color:var(--ink-soft);margin-bottom:8px;
}
.note{
  border-left:2px solid var(--jjok);padding:6px 14px;margin-bottom:10px;
  font-size:.92rem;background:#F0EDE2;
}
.note .nd{font-family:'IBM Plex Sans KR',sans-serif;font-size:.72rem;color:var(--ink-soft);display:block}
.note-form{display:flex;gap:8px;margin-top:6px}
.note-form input{
  flex:1;font-family:'Gowun Batang',serif;font-size:.92rem;
  border:1px solid var(--line);border-radius:2px;background:#FBF9F2;
  padding:8px 12px;color:var(--ink);
}
.note-form input:focus{outline:2px solid var(--jjok);outline-offset:1px}

/* 토스트 */
#toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);
  font-family:'IBM Plex Sans KR',sans-serif;font-size:.82rem;
  padding:9px 20px;border-radius:2px;opacity:0;pointer-events:none;
  transition:opacity .25s;
}
#toast.show{opacity:1}

@media (max-width:560px){
  header{padding:20px 16px 0}
  main{padding:16px 16px 60px}
  textarea{padding:20px 16px;min-height:50vh}
  .done-view{padding:26px 18px 40px}
}
</style>
</head>
<body>

<header>
  <h1>초고 <span class="num">七五〇</span></h1>
  <div class="spacer"></div>
  <nav>
    <select id="projectSelect" aria-label="프로젝트 선택"></select>
    <button class="btn" id="newProjectBtn">새 프로젝트</button>
    <button class="btn" id="writeBtn">오늘 쓰기</button>
    <button class="btn" id="archiveBtn">보관함</button>
    <button class="btn" id="exportBtn">초고 내보내기</button>
  </nav>
</header>

<main id="main"></main>
<div id="toast" role="status"></div>

<script>
(function(){
const GOAL = 750;
const KEY = 'chogo750.v1';
const $ = s => document.querySelector(s);

/* ── 저장소 ── */
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {projects:[], activeId:null, wip:{}};
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
let state = load();

if(state.projects.length === 0){
  const p = {id:uid(), name:'기본 프로젝트', createdAt:Date.now(), entries:[]};
  state.projects.push(p); state.activeId = p.id; save();
}
if(!state.projects.find(p=>p.id===state.activeId)) state.activeId = state.projects[0].id;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(s){
  const [y,m,d] = s.split('-');
  return y + '년 ' + Number(m) + '월 ' + Number(d) + '일';
}
function proj(){ return state.projects.find(p=>p.id===state.activeId); }
function countWords(t){
  const arr = t.trim().split(/\s+/).filter(Boolean);
  return t.trim() ? arr.length : 0;
}

/* ── 상단 내비 ── */
function renderNav(){
  const sel = $('#projectSelect');
  sel.innerHTML = '';
  state.projects.forEach(p=>{
    const o = document.createElement('option');
    o.value = p.id; o.textContent = p.name;
    if(p.id === state.activeId) o.selected = true;
    sel.appendChild(o);
  });
  $('#writeBtn').classList.toggle('active', view==='write');
  $('#archiveBtn').classList.toggle('active', view==='archive' || view==='read');
}
$('#projectSelect').addEventListener('change', e=>{
  state.activeId = e.target.value; save();
  view = 'write'; render();
});
$('#newProjectBtn').addEventListener('click', ()=>{
  const name = prompt('새 프로젝트 이름');
  if(!name || !name.trim()) return;
  const p = {id:uid(), name:name.trim(), createdAt:Date.now(), entries:[]};
  state.projects.push(p); state.activeId = p.id; save();
  view = 'write'; render();
});
$('#writeBtn').addEventListener('click', ()=>{ view='write'; render(); });
$('#archiveBtn').addEventListener('click', ()=>{ view='archive'; render(); });
$('#exportBtn').addEventListener('click', exportDraft);

/* ── 화면 ── */
let view = 'write';
let readingId = null;

function render(){
  renderNav();
  const m = $('#main');
  m.innerHTML = '';
  if(view==='write') renderWrite(m);
  else if(view==='archive') renderArchive(m);
  else if(view==='read') renderRead(m);
}

/* 노트 세 장 표시 */
function pagesEl(words){
  const wrap = document.createElement('div');
  wrap.className = 'pages';
  wrap.setAttribute('aria-label', '진행: ' + words + ' / ' + GOAL + ' 단어');
  for(let i=0;i<3;i++){
    const per = 250;
    const filled = Math.max(0, Math.min(per, words - i*per)) / per * 100;
    const pg = document.createElement('div');
    pg.className = 'page' + (filled>=100?' full':'');
    const f = document.createElement('div');
    f.className = 'fill'; f.style.height = filled + '%';
    pg.appendChild(f); wrap.appendChild(pg);
  }
  return wrap;
}

function renderWrite(m){
  const p = proj();
  const today = todayStr();
  const done = p.entries.find(e=>e.date===today);

  const dl = document.createElement('div');
  dl.className = 'date-line';
  dl.innerHTML = '<span class="today">' + fmtDate(today) + ' · ' + escapeHtml(p.name) + '</span><span class="rule"></span>';
  const wordsNow = done ? done.words : countWords(state.wip[p.id]?.date===today ? state.wip[p.id].text : '');
  dl.appendChild(pagesEl(wordsNow));
  m.appendChild(dl);

  const sheet = document.createElement('div');
  sheet.className = 'sheet';

  if(done){
    const dv = document.createElement('div');
    dv.className = 'done-view';
    dv.textContent = done.text;
    const seal = document.createElement('div');
    seal.className = 'seal'; seal.textContent = '了';
    dv.appendChild(seal);
    sheet.appendChild(dv);
    const msg = document.createElement('div');
    msg.className = 'done-msg';
    msg.textContent = '오늘의 초고 끝. ' + done.words + '단어. 원고는 보관함에서 주석만 달 수 있습니다.';
    sheet.appendChild(msg);
  } else {
    const wip = (state.wip[p.id] && state.wip[p.id].date===today) ? state.wip[p.id].text : '';
    const ta = document.createElement('textarea');
    ta.placeholder = '노트 세 장을 채우듯이. 고치지 말고, 앞으로만.';
    ta.value = wip;
    sheet.appendChild(ta);

    const st = document.createElement('div');
    st.className = 'status';
    const cnt = document.createElement('span');
    cnt.className = 'count';
    const fin = document.createElement('button');
    fin.className = 'finish';
    fin.textContent = '오늘의 초고 완료';
    st.appendChild(cnt); st.appendChild(fin);
    sheet.appendChild(st);

    function update(){
      const w = countWords(ta.value);
      cnt.innerHTML = '<b>' + w + '</b> / ' + GOAL + ' 단어';
      fin.classList.toggle('ready', w >= GOAL);
      fin.disabled = w < GOAL;
      const old = m.querySelector('.pages');
      if(old) old.replaceWith(pagesEl(w));
    }
    let t;
    ta.addEventListener('input', ()=>{
      update();
      clearTimeout(t);
      t = setTimeout(()=>{
        state.wip[p.id] = {date:today, text:ta.value};
        save();
      }, 400);
    });
    fin.addEventListener('click', ()=>{
      const w = countWords(ta.value);
      if(w < GOAL) return;
      if(!confirm('오늘의 초고를 저장할까요? 저장 후에는 고칠 수 없고 주석만 달 수 있습니다.')) return;
      p.entries.push({id:uid(), date:today, text:ta.value, words:w, completedAt:Date.now(), notes:[]});
      delete state.wip[p.id];
      save(); render();
    });
    update();
  }
  m.appendChild(sheet);
}

function renderArchive(m){
  const p = proj();
  const dl = document.createElement('div');
  dl.className = 'date-line';
  dl.innerHTML = '<span class="today">보관함 · ' + escapeHtml(p.name) + '</span><span class="rule"></span>';
  m.appendChild(dl);

  if(p.entries.length===0){
    const e = document.createElement('div');
    e.className = 'empty';
    e.textContent = '아직 저장된 초고가 없습니다. 오늘 쓰기에서 첫 750단어를 채워보세요.';
    m.appendChild(e);
    return;
  }
  const ul = document.createElement('ul');
  ul.className = 'entry-list';
  [...p.entries].sort((a,b)=>b.date.localeCompare(a.date)).forEach(en=>{
    const li = document.createElement('li');
    const b = document.createElement('button');
    b.innerHTML = '<span>' + fmtDate(en.date) + '</span>'
      + '<span class="meta">' + en.words + '단어'
      + (en.notes.length ? ' · 주석 ' + en.notes.length : '') + '</span>';
    b.addEventListener('click', ()=>{ readingId = en.id; view='read'; render(); });
    li.appendChild(b); ul.appendChild(li);
  });
  m.appendChild(ul);
}

function renderRead(m){
  const p = proj();
  const en = p.entries.find(e=>e.id===readingId);
  if(!en){ view='archive'; render(); return; }

  const back = document.createElement('button');
  back.className = 'back'; back.textContent = '← 보관함';
  back.style.marginTop = '20px';
  back.addEventListener('click', ()=>{ view='archive'; render(); });
  m.appendChild(back);

  const head = document.createElement('div');
  head.className = 'read-head';
  head.innerHTML = '<span class="d">' + fmtDate(en.date) + ' · ' + en.words + '단어</span><span class="rule"></span>';
  m.appendChild(head);

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  const dv = document.createElement('div');
  dv.className = 'done-view';
  dv.textContent = en.text;
  const seal = document.createElement('div');
  seal.className = 'seal'; seal.textContent = '了';
  dv.appendChild(seal);
  sheet.appendChild(dv);
  m.appendChild(sheet);

  const nt = document.createElement('div');
  nt.className = 'notes';
  nt.innerHTML = '<h3>주석</h3>';
  en.notes.forEach(n=>{
    const d = document.createElement('div');
    d.className = 'note';
    const nd = document.createElement('span');
    nd.className = 'nd';
    nd.textContent = new Date(n.createdAt).toLocaleDateString('ko-KR');
    d.appendChild(nd);
    d.appendChild(document.createTextNode(n.text));
    nt.appendChild(d);
  });
  const form = document.createElement('div');
  form.className = 'note-form';
  const inp = document.createElement('input');
  inp.placeholder = '이 초고에 주석 달기';
  const add = document.createElement('button');
  add.className = 'btn'; add.textContent = '추가';
  function addNote(){
    const v = inp.value.trim();
    if(!v) return;
    en.notes.push({id:uid(), text:v, createdAt:Date.now()});
    save(); render();
  }
  add.addEventListener('click', addNote);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') addNote(); });
  form.appendChild(inp); form.appendChild(add);
  nt.appendChild(form);
  m.appendChild(nt);
}

/* ── 내보내기 ── */
function exportDraft(){
  const p = proj();
  if(p.entries.length===0){ toast('내보낼 초고가 없습니다'); return; }
  const lines = [];
  lines.push(p.name);
  lines.push('초고 내보내기 · ' + fmtDate(todayStr()));
  lines.push('');
  [...p.entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(en=>{
    lines.push('──── ' + fmtDate(en.date) + ' (' + en.words + '단어) ────');
    lines.push('');
    lines.push(en.text);
    lines.push('');
    en.notes.forEach(n=>{
      lines.push('[주석] ' + new Date(n.createdAt).toLocaleDateString('ko-KR') + ' — ' + n.text);
    });
    if(en.notes.length) lines.push('');
  });
  const text = lines.join('\n');
  copyText(text).then(ok=>{
    toast(ok ? '초고 전체를 클립보드에 복사했습니다' : '복사에 실패했습니다');
  });
}
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text).then(()=>true).catch(()=>fallbackCopy(text));
  }
  return Promise.resolve(fallbackCopy(text));
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  let ok = false;
  try{ ok = document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  return ok;
}

/* ── 유틸 ── */
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* 완료 순간 낙관 애니메이션 */
const obs = new MutationObserver(()=>{
  document.querySelectorAll('.seal:not(.seen)').forEach(s=>{
    s.classList.add('seen','stamp-in');
  });
});
obs.observe($('#main'), {childList:true, subtree:true});

render();
})();
</script>
</body>
</html>
