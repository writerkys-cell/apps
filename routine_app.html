<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루틴 매니저</title>
<style>
  :root{
    --bg:#f4f2ee;
    --card:#ffffff;
    --border:#e4e0d8;
    --text:#2b2b28;
    --muted:#8a857a;
    --accent:#c9612f;
    --accent-soft:#f2ded1;
    --done:#b7b2a6;
    --danger:#b3432f;
    --active:#3068a8;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:560px;margin:0 auto;}
  header{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:20px;
  }
  header h1{font-size:20px;margin:0;}
  header .date{font-size:13px;color:var(--muted);}
  .sync-actions{display:flex;gap:6px;justify-content:center;margin-top:14px;}
  .sync-actions .btn{
    background:transparent;border:1px solid var(--border);
    color:var(--muted);padding:4px 10px;font-size:10px;border-radius:12px;
  }

  /* --- 루틴: hero box, most prominent --- */
  .hero-card{
    background:var(--card);
    border:2px solid var(--accent);
    border-top:6px solid var(--accent);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:2px;
    box-shadow:0 6px 18px rgba(201,97,47,0.18);
  }
  .hero-card h2{
    font-size:18px;
    font-weight:700;
    margin:0 0 12px;
    color:var(--accent);
    display:flex;align-items:center;justify-content:space-between;
  }
  .hero-card h2 .sub{font-size:12px;color:var(--muted);font-weight:normal;}

  .item{
    display:flex;align-items:center;gap:8px;
    padding:8px 0;
    border-bottom:1px solid var(--border);
  }
  .item:last-of-type{border-bottom:none;}
  .item input[type=checkbox]{
    width:20px;height:20px;flex:none;accent-color:var(--accent);
  }
  .item .title{
    flex:1;min-width:0;
    font-size:14px;
    word-break:break-word;
  }
  .item.done .title{
    text-decoration:line-through;
    color:var(--done);
  }
  .item .title a{
    color:var(--text);
    text-decoration:underline;
    text-decoration-color:var(--accent);
    text-underline-offset:2px;
  }
  .item.done .title a{
    color:var(--done);
  }
  .item.active .title,
  .item.active .title a{
    color:var(--active);
    font-weight:600;
  }
  .btn{
    border:none;border-radius:8px;
    padding:6px 10px;
    font-size:12px;
    cursor:pointer;
    background:var(--accent-soft);
    color:var(--accent);
    white-space:nowrap;
  }
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn.icon{
    background:transparent;color:var(--muted);padding:4px 6px;
  }
  .btn.danger{background:#f6dcd5;color:var(--danger);}
  .btn.primary{background:var(--accent);color:#fff;}
  .row-actions{display:flex;gap:4px;flex:none;}
  .add-btn{
    width:100%;
    background:none;
    border:1px dashed var(--border);
    color:var(--muted);
    border-radius:10px;
    padding:8px;
    font-size:13px;
    cursor:pointer;
    margin-top:8px;
  }
  .empty{
    font-size:13px;color:var(--muted);padding:6px 0;
  }

  /* modal / form overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.35);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:50;
  }
  .overlay.hidden{display:none;}
  .sheet{
    background:#fff;width:100%;max-width:560px;
    border-radius:18px 18px 0 0;
    padding:20px;max-height:80vh;overflow-y:auto;
  }
  .sheet h3{margin:0 0 14px;font-size:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .field input{
    width:100%;padding:9px 10px;border:1px solid var(--border);
    border-radius:8px;font-size:14px;
  }
  .sheet-actions{
    display:flex;gap:8px;margin-top:16px;
  }
  .sheet-actions .btn{flex:1;padding:10px;text-align:center;font-size:14px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>소설가의 하루</h1>
    <div class="date" id="dateLabel"></div>
  </header>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importData(event)">

  <section class="hero-card" id="section-routines">
    <div class="list" id="list-routines"></div>
    <button class="add-btn" onclick="openItemForm('routines')">+ 루틴 추가</button>
  </section>

  <div class="sync-actions">
    <button class="btn" onclick="exportData()">내보내기</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">가져오기</button>
  </div>
</div>

<!-- item add/edit sheet (루틴 전용) -->
<div class="overlay hidden" id="itemOverlay">
  <div class="sheet">
    <h3 id="itemFormTitle">항목 추가</h3>
    <div class="field">
      <label>이름</label>
      <input type="text" id="f-title" placeholder="예: 아침 루틴">
    </div>
    <div class="field">
      <label>링크 (Scrivener 링크, 웹페이지 URL 등, 선택사항)</label>
      <input type="text" id="f-link" placeholder="scrivener://... 또는 https://...">
    </div>
    <div class="field">
      <label>시작 단축어 이름</label>
      <input type="text" id="f-start" placeholder="Apple 단축어 이름">
    </div>
    <div class="field">
      <label>끝 단축어 이름</label>
      <input type="text" id="f-end" placeholder="Apple 단축어 이름">
    </div>
    <div class="sheet-actions">
      <button class="btn" onclick="closeItemForm()">취소</button>
      <button class="btn danger" id="f-delete" style="display:none" onclick="deleteFromForm()">삭제</button>
      <button class="btn primary" onclick="saveItemForm()">저장</button>
    </div>
  </div>
</div>

<script>
const KEY = 'routineAppData_v1';

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function defaultState(){
  return {
    lastDate: todayStr(),
    nextId: 1,
    routines: []
  };
}

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    return defaultState();
  }
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(state));
}

function genId(){
  const id = state.nextId || 1;
  state.nextId = id + 1;
  return id;
}

let state = load();

function rolloverIfNewDay(){
  const t = todayStr();
  if(state.lastDate !== t){
    state.routines.forEach(r => { r.done = false; r.active = false; });
    state.lastDate = t;
    save();
  }
}

function runShortcut(name){
  if(!name){
    alert('먼저 단축어 이름을 설정해주세요.');
    return;
  }
  window.location.href = 'shortcuts://run-shortcut?name=' + encodeURIComponent(name);
}

function renderRoutines(){
  const container = document.getElementById('list-routines');
  const items = state.routines;
  if(!items.length){
    container.innerHTML = '<div class="empty">아직 루틴이 없어요.</div>';
    return;
  }
  container.innerHTML = items.map((item, idx) => `
    <div class="item ${item.done ? 'done' : ''} ${item.active ? 'active' : ''}">
      <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleDone(${item.id})">
      <div class="title">${item.link ? `<a href="${escapeHtml(item.link)}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>` : escapeHtml(item.title)}</div>
      <div class="row-actions">
        <button class="btn" ${!item.startShortcut ? 'disabled' : ''} onclick="startRoutine(${item.id})">시작</button>
        <button class="btn" ${!item.endShortcut ? 'disabled' : ''} onclick="endRoutine(${item.id})">끝</button>
        <button class="btn icon" ${idx === 0 ? 'disabled' : ''} onclick="moveRoutine(${item.id}, -1)">▲</button>
        <button class="btn icon" ${idx === items.length - 1 ? 'disabled' : ''} onclick="moveRoutine(${item.id}, 1)">▼</button>
        <button class="btn icon" onclick="openItemForm('routines', ${item.id})">✎</button>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){
  return String(s || '').replace(/'/g, "\\'");
}

function startRoutine(id){
  const item = state.routines.find(x => x.id === id);
  if(item){
    item.active = true;
    save();
    renderAll();
    runShortcut(item.startShortcut);
  }
}

function endRoutine(id){
  const item = state.routines.find(x => x.id === id);
  if(item){
    item.active = false;
    save();
    renderAll();
    runShortcut(item.endShortcut);
  }
}

function toggleDone(id){
  const item = state.routines.find(x => x.id === id);
  if(item){
    item.done = !item.done;
    save();
    renderAll();
  }
}

function moveRoutine(id, delta){
  const idx = state.routines.findIndex(x => x.id === id);
  if(idx === -1) return;
  const newIdx = idx + delta;
  if(newIdx < 0 || newIdx >= state.routines.length) return;
  const arr = state.routines;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  save();
  renderAll();
}

function progressLabel(items){
  if(!items.length) return '';
  const done = items.filter(i => i.done).length;
  return done === items.length ? '완료 ✓' : `${done}/${items.length}`;
}

function renderAll(){
  document.getElementById('dateLabel').textContent = todayStr();
  renderRoutines();
}

// --- item add/edit form (루틴 전용) ---
let formContext = { id: null };

function openItemForm(section, id){
  formContext = { id: id || null };
  const titleEl = document.getElementById('itemFormTitle');
  const del = document.getElementById('f-delete');
  if(id){
    const item = state.routines.find(x => x.id === id);
    titleEl.textContent = '항목 수정';
    document.getElementById('f-title').value = item.title;
    document.getElementById('f-link').value = item.link || '';
    document.getElementById('f-start').value = item.startShortcut || '';
    document.getElementById('f-end').value = item.endShortcut || '';
    del.style.display = 'inline-block';
  }else{
    titleEl.textContent = '항목 추가';
    document.getElementById('f-title').value = '';
    document.getElementById('f-link').value = '';
    document.getElementById('f-start').value = '';
    document.getElementById('f-end').value = '';
    del.style.display = 'none';
  }
  document.getElementById('itemOverlay').classList.remove('hidden');
}

function closeItemForm(){
  document.getElementById('itemOverlay').classList.add('hidden');
}

function saveItemForm(){
  const title = document.getElementById('f-title').value.trim();
  if(!title){ alert('이름을 입력해주세요.'); return; }
  const link = document.getElementById('f-link').value.trim();
  const startShortcut = document.getElementById('f-start').value.trim();
  const endShortcut = document.getElementById('f-end').value.trim();
  const { id } = formContext;
  if(id){
    const item = state.routines.find(x => x.id === id);
    item.title = title;
    item.link = link;
    item.startShortcut = startShortcut;
    item.endShortcut = endShortcut;
  }else{
    state.routines.push({ id: genId(), title, link, startShortcut, endShortcut, done:false, active:false });
  }
  save();
  renderAll();
  closeItemForm();
}

function deleteFromForm(){
  const { id } = formContext;
  if(!id) return;
  if(!confirm('삭제할까요?')) return;
  state.routines = state.routines.filter(x => x.id !== id);
  save();
  renderAll();
  closeItemForm();
}

// --- 기기 간 동기화: 내보내기 / 가져오기 ---
function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'routine-data.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.routines)){
        alert('올바른 데이터 파일이 아니에요.');
        return;
      }
      if(!confirm('현재 기기의 데이터를 가져온 파일로 덮어쓸까요?')) return;
      state = Object.assign(defaultState(), parsed);
      save();
      renderAll();
      alert('불러왔어요.');
    }catch(e){
      alert('파일을 읽는 중 오류가 발생했어요.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// init
rolloverIfNewDay();
renderAll();
</script>
</body>
</html>
