<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작가 수입 장부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFAF5;
  --paper-deep:#F3F1E9;
  --ink:#26312C;
  --ink-soft:#55625C;
  --jade:#3F7D6C;
  --jade-deep:#2E5F52;
  --jade-line:#CFE0D8;
  --jade-faint:#E7EFEA;
  --seal:#B23A2C;
  --white:#FFFFFF;
  --serif:'Noto Serif KR','Nanum Myeongjo',serif;
  --sans:'IBM Plex Sans KR',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion: reduce){html{scroll-behavior:auto} *{transition:none!important;animation:none!important}}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.6;
}
.wrap{max-width:880px;margin:0 auto;padding:36px 20px 80px}

/* ── 헤더 ── */
header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:28px}
.title-block{display:flex;align-items:center;gap:14px}
.seal{
  width:46px;height:46px;flex:none;
  border:2.5px solid var(--seal);border-radius:6px;
  color:var(--seal);font-family:var(--serif);font-weight:700;font-size:17px;line-height:1.15;
  display:flex;align-items:center;justify-content:center;text-align:center;
  transform:rotate(-3deg);
}
h1{font-family:var(--serif);font-weight:700;font-size:26px;letter-spacing:.02em}
.subtitle{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.year-nav{display:flex;align-items:center;gap:10px}
.year-nav button{
  background:none;border:1px solid var(--jade-line);border-radius:6px;
  width:32px;height:32px;font-size:15px;color:var(--jade-deep);cursor:pointer;
}
.year-nav button:hover{background:var(--jade-faint)}
.year-nav .year{font-family:var(--serif);font-size:22px;font-weight:600;min-width:74px;text-align:center}

/* ── 연간 합계 (원고지 셀) ── */
.ledger-hero{
  background:
    repeating-linear-gradient(to right, transparent 0 27px, var(--jade-line) 27px 28px),
    repeating-linear-gradient(to bottom, transparent 0 27px, var(--jade-line) 27px 28px),
    var(--white);
  border:1px solid var(--jade-line);
  border-radius:10px;
  padding:26px 24px 22px;
  margin-bottom:22px;
}
.hero-label{font-size:12px;letter-spacing:.28em;color:var(--jade-deep);font-weight:600;margin-bottom:12px}
.cells{display:flex;flex-wrap:wrap;gap:5px}
.cell{
  min-width:44px;height:56px;padding:0 8px;
  background:var(--white);
  border:1.5px solid var(--jade);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:30px;font-weight:700;
  font-variant-numeric:tabular-nums;
}
.cell.unit{border-color:var(--jade-line);color:var(--jade-deep);font-size:20px}
.hero-sub{display:flex;gap:26px;margin-top:16px;flex-wrap:wrap}
.hero-sub div{font-size:13px;color:var(--ink-soft)}
.hero-sub b{display:block;font-family:var(--serif);font-size:17px;color:var(--ink);font-variant-numeric:tabular-nums}

/* ── 섹션 공통 ── */
section{margin-bottom:30px}
.sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
.sec-head h2{font-family:var(--serif);font-size:17px;font-weight:600}
.sec-head .rule{flex:1;border-top:1px solid var(--jade-line)}
.sec-head .hint{font-size:12px;color:var(--ink-soft)}

/* ── 월별 그래프 ── */
.chart{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;align-items:end;height:170px;padding:0 2px}
.bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:pointer;border-radius:6px;padding:4px 2px 0}
.bar-col:hover{background:var(--jade-faint)}
.bar-col.active{background:var(--jade-faint);outline:1.5px solid var(--jade)}
.bar-amt{font-size:10px;color:var(--ink-soft);font-variant-numeric:tabular-nums;margin-bottom:3px;white-space:nowrap}
.bar{width:100%;max-width:34px;background:var(--jade);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.bar.zero{background:var(--jade-line)}
.bar-label{font-size:11.5px;color:var(--ink-soft);margin-top:6px}
.bar-col.active .bar-label{color:var(--jade-deep);font-weight:600}

/* ── 항목별 ── */
.cats{display:flex;flex-direction:column;gap:8px}
.cat-row{display:grid;grid-template-columns:88px 1fr 130px;align-items:center;gap:12px;font-size:13.5px}
.cat-row .name{color:var(--ink-soft)}
.cat-track{background:var(--jade-faint);border-radius:4px;height:14px;overflow:hidden}
.cat-fill{height:100%;background:var(--jade);border-radius:4px;min-width:2px;transition:width .3s}
.cat-row .amt{text-align:right;font-variant-numeric:tabular-nums}
.cat-row .amt small{color:var(--ink-soft);margin-left:5px}

/* ── 입력 폼 ── */
.form-card{background:var(--white);border:1px solid var(--jade-line);border-radius:10px;padding:18px}
.form-grid{display:grid;grid-template-columns:130px 130px 1fr 150px;gap:10px;margin-bottom:10px}
.form-grid2{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center}
label.f{display:block;font-size:11.5px;color:var(--ink-soft);margin-bottom:4px}
input,select,textarea{
  width:100%;font-family:var(--sans);font-size:14px;color:var(--ink);
  border:1px solid var(--jade-line);border-radius:6px;padding:8px 10px;background:var(--paper);
}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--jade);outline-offset:1px}
.btn{
  font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;
  border:none;border-radius:7px;padding:10px 18px;
}
.btn-primary{background:var(--jade-deep);color:#fff}
.btn-primary:hover{background:var(--jade)}
.btn-ghost{background:none;border:1px solid var(--jade-line);color:var(--ink-soft)}
.btn-ghost:hover{background:var(--jade-faint)}
#cancelEdit{display:none}

/* ── 내역 목록 ── */
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{
  text-align:left;font-weight:600;color:var(--jade-deep);font-size:12px;
  border-bottom:1.5px solid var(--jade);padding:7px 8px;letter-spacing:.05em;
}
tbody td{border-bottom:1px solid var(--jade-faint);padding:9px 8px;vertical-align:top}
tbody tr:hover{background:var(--jade-faint)}
td.amt,th.amt{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tag{
  display:inline-block;font-size:11.5px;color:var(--jade-deep);
  border:1px solid var(--jade-line);border-radius:20px;padding:1px 9px;background:var(--white);white-space:nowrap;
}
.memo{color:var(--ink-soft);font-size:12px}
.row-actions button{
  background:none;border:none;cursor:pointer;font-size:12px;color:var(--ink-soft);padding:2px 5px;
}
.row-actions button:hover{color:var(--ink);text-decoration:underline}
.row-actions .del:hover{color:var(--seal)}
.empty{
  text-align:center;color:var(--ink-soft);padding:36px 10px;font-size:14px;
  border:1.5px dashed var(--jade-line);border-radius:10px;background:var(--white);
}

/* ── 클로드 분석 ── */
.analysis-card{background:var(--white);border:1px solid var(--jade-line);border-radius:10px;padding:20px}
.analysis-head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.analysis-head p{font-size:13px;color:var(--ink-soft);max-width:520px}
#analysisOut{
  margin-top:18px;padding-top:18px;border-top:1px solid var(--jade-faint);
  font-size:14.5px;line-height:1.85;display:none;
}
#analysisOut h3{font-family:var(--serif);font-size:15.5px;margin:16px 0 6px;color:var(--jade-deep)}
#analysisOut h3:first-child{margin-top:0}
#analysisOut p{margin-bottom:10px}
#analysisOut ul{margin:0 0 10px 20px}
#analysisOut li{margin-bottom:4px}
#promptBox{
  width:100%;min-height:220px;font-family:var(--sans);font-size:13px;line-height:1.7;
  background:var(--paper);border:1px solid var(--jade-line);border-radius:8px;padding:12px;resize:vertical;
}
.notice{font-size:12px;color:var(--ink-soft);margin-top:8px}
.notice.warn{color:var(--seal)}

/* ── 토스트 ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--paper);font-size:13.5px;padding:10px 20px;border-radius:8px;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:680px){
  .form-grid{grid-template-columns:1fr 1fr}
  .cell{min-width:34px;height:46px;font-size:23px}
  .cat-row{grid-template-columns:70px 1fr 105px}
  .chart{height:130px}
  .bar-amt{display:none}
  th.hide-m,td.hide-m{display:none}
  header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="title-block">
    <div class="seal">記錄</div>
    <div>
      <h1>작가 수입 장부</h1>
      <div class="subtitle">인세 · 원고료 · 강연료 · 심사비 · 추천사비 · 재수록료 · 상금 · 행사비</div>
    </div>
  </div>
  <div class="year-nav">
    <button id="prevYear" aria-label="이전 해">‹</button>
    <div class="year" id="yearLabel">2026</div>
    <button id="nextYear" aria-label="다음 해">›</button>
  </div>
</header>

<div class="ledger-hero">
  <div class="hero-label">연간 총수입</div>
  <div class="cells" id="totalCells" aria-live="polite"></div>
  <div class="hero-sub">
    <div>월평균<b id="avgMonth">0원</b></div>
    <div>이번 달<b id="thisMonth">0원</b></div>
    <div>등록 건수<b id="entryCount">0건</b></div>
    <div>가장 큰 수입원<b id="topCat">—</b></div>
  </div>
</div>

<section>
  <div class="sec-head"><h2>월별 수입</h2><div class="rule"></div><span class="hint">막대를 누르면 해당 달 내역만 봅니다</span></div>
  <div class="chart" id="chart"></div>
</section>

<section>
  <div class="sec-head"><h2>항목별 수입</h2><div class="rule"></div></div>
  <div class="cats" id="cats"></div>
</section>

<section>
  <div class="sec-head"><h2 id="formTitle">수입 기록</h2><div class="rule"></div></div>
  <div class="form-card">
    <div class="form-grid">
      <div><label class="f" for="inDate">날짜</label><input type="date" id="inDate"></div>
      <div><label class="f" for="inCat">항목</label>
        <select id="inCat">
          <option>인세</option><option>원고료</option><option>강연료</option>
          <option>심사비</option><option>추천사비</option><option>재수록료</option>
          <option>상금</option><option>행사비</option><option>기타</option>
        </select>
      </div>
      <div><label class="f" for="inSource">지급처 (출판사·매체·기관)</label><input type="text" id="inSource" placeholder="예: 문학동네, 생활성서"></div>
      <div><label class="f" for="inAmount">금액 (원)</label><input type="text" id="inAmount" inputmode="numeric" placeholder="예: 1,200,000"></div>
    </div>
    <div class="form-grid2">
      <div><label class="f" for="inMemo">메모</label><input type="text" id="inMemo" placeholder="예: 장편 2쇄 인세, ○○도서관 강연"></div>
      <button class="btn btn-ghost" id="cancelEdit">취소</button>
      <button class="btn btn-primary" id="saveBtn" style="align-self:end">기록하기</button>
    </div>
    <div class="notice" id="storageNotice"></div>
  </div>
</section>

<section>
  <div class="sec-head">
    <h2 id="listTitle">수입 내역</h2><div class="rule"></div>
    <button class="btn btn-ghost" id="clearFilter" style="display:none;padding:4px 12px;font-size:12px">전체 보기</button>
    <button class="btn btn-ghost" id="exportCsv" style="padding:4px 12px;font-size:12px">CSV 내려받기</button>
    <button class="btn btn-ghost" id="importCsvBtn" style="padding:4px 12px;font-size:12px">CSV 불러오기</button>
    <input type="file" id="importCsvFile" accept=".csv,text/csv" style="display:none">
  </div>
  <div id="listArea"></div>
</section>

<section>
  <div class="sec-head"><h2>클로드에게 분석 요청</h2><div class="rule"></div></div>
  <div class="analysis-card">
    <div class="analysis-head">
      <p>버튼을 누르면 올해의 수입 내역과 분석 요청문이 하나의 글로 만들어집니다. 복사해서 Claude 대화창에 붙여넣으면, 월별 기복·정기 수입과 일회성 수입의 비율·특정 항목 의존도를 분석해 줍니다.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" id="analyzeBtn">분석 요청문 만들기</button>
        <button class="btn btn-ghost" id="copyPromptBtn" style="display:none">복사하기</button>
      </div>
    </div>
    <div id="analysisOut"></div>
  </div>
</section>

</div>
<div id="toast" role="status"></div>

<script>
(function(){
"use strict";
const KEY='writer-income:entries';
const CATS=['인세','원고료','강연료','심사비','추천사비','재수록료','상금','행사비','기타'];
let entries=[];            // {id,date,category,source,amount,memo}
let year=new Date().getFullYear();
let monthFilter=null;      // 0-11 or null
let editingId=null;
let storageOk=false;

const $=id=>document.getElementById(id);
const won=n=>n.toLocaleString('ko-KR')+'원';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ── 저장소 (브라우저 localStorage) ── */
async function loadEntries(){
  try{
    const r=localStorage.getItem(KEY);
    storageOk=true;
    return r===null?null:JSON.parse(r);
  }catch(e){storageOk=false;return null;}
}
async function persist(){
  try{localStorage.setItem(KEY,JSON.stringify(entries));storageOk=true;}
  catch(e){storageOk=false;updateStorageNotice();}
}
function updateStorageNotice(){
  const n=$('storageNotice');
  if(storageOk){n.textContent='기록은 이 브라우저에 자동 저장됩니다. 같은 브라우저로 열면 데이터가 유지되지만, 브라우저 데이터를 정리하면 함께 지워지니 이따금 CSV로 백업해 두세요.';n.className='notice';}
  else{n.textContent='이 환경에서는 자동 저장이 되지 않습니다. 파일을 내려받아 맥의 브라우저에서 직접 열어 주세요. 닫기 전에는 CSV로 내려받아 보관하세요.';n.className='notice warn';}
}

/* ── 계산 ── */
const yearEntries=()=>entries.filter(e=>new Date(e.date+'T00:00:00').getFullYear()===year);
function monthlyTotals(list){
  const m=Array(12).fill(0);
  list.forEach(e=>{m[new Date(e.date+'T00:00:00').getMonth()]+=e.amount});
  return m;
}
function categoryTotals(list){
  const c={};
  list.forEach(e=>{c[e.category]=(c[e.category]||0)+e.amount});
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}

/* ── 렌더 ── */
function render(){
  $('yearLabel').textContent=year;
  const ylist=yearEntries();
  const total=ylist.reduce((s,e)=>s+e.amount,0);
  const months=monthlyTotals(ylist);
  const cats=categoryTotals(ylist);
  const now=new Date();

  // 원고지 셀 합계
  const cellsEl=$('totalCells');cellsEl.innerHTML='';
  const str=total.toLocaleString('ko-KR');
  for(const ch of str){
    const d=document.createElement('div');d.className='cell';d.textContent=ch;cellsEl.appendChild(d);
  }
  const u=document.createElement('div');u.className='cell unit';u.textContent='원';cellsEl.appendChild(u);

  // 요약
  const activeMonths=months.filter(v=>v>0).length||1;
  $('avgMonth').textContent=won(Math.round(total/activeMonths));
  $('thisMonth').textContent=(now.getFullYear()===year)?won(months[now.getMonth()]):'—';
  $('entryCount').textContent=ylist.length+'건';
  $('topCat').textContent=cats.length?cats[0][0]+' ('+Math.round(cats[0][1]/total*100)+'%)':'—';

  // 월별 그래프
  const max=Math.max(...months,1);
  const chart=$('chart');chart.innerHTML='';
  months.forEach((v,i)=>{
    const col=document.createElement('div');
    col.className='bar-col'+(monthFilter===i?' active':'');
    col.setAttribute('role','button');col.tabIndex=0;
    col.setAttribute('aria-label',(i+1)+'월 '+won(v));
    const amt=document.createElement('div');amt.className='bar-amt';
    amt.textContent=v>0?(v>=10000?Math.round(v/10000).toLocaleString()+'만':v.toLocaleString()):'';
    const bar=document.createElement('div');bar.className='bar'+(v===0?' zero':'');
    bar.style.height=(v===0?2:Math.max(4,v/max*110))+'px';
    const lab=document.createElement('div');lab.className='bar-label';lab.textContent=(i+1)+'월';
    col.append(amt,bar,lab);
    const toggle=()=>{monthFilter=(monthFilter===i)?null:i;render();};
    col.addEventListener('click',toggle);
    col.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}});
    chart.appendChild(col);
  });

  // 항목별
  const catsEl=$('cats');catsEl.innerHTML='';
  if(!cats.length){catsEl.innerHTML='<div class="empty">아직 기록이 없습니다.</div>';}
  cats.forEach(([name,amt])=>{
    const row=document.createElement('div');row.className='cat-row';
    row.innerHTML='<div class="name">'+name+'</div>'
      +'<div class="cat-track"><div class="cat-fill" style="width:'+(amt/cats[0][1]*100)+'%"></div></div>'
      +'<div class="amt">'+won(amt)+'<small>'+Math.round(amt/total*100)+'%</small></div>';
    catsEl.appendChild(row);
  });

  // 목록
  renderList(ylist);
}

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderList(ylist){
  let list=ylist.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(monthFilter!==null){
    list=list.filter(e=>new Date(e.date+'T00:00:00').getMonth()===monthFilter);
    $('listTitle').textContent=(monthFilter+1)+'월 수입 내역 · '+won(list.reduce((s,e)=>s+e.amount,0));
    $('clearFilter').style.display='';
  }else{
    $('listTitle').textContent='수입 내역';
    $('clearFilter').style.display='none';
  }
  const area=$('listArea');
  if(!list.length){
    area.innerHTML='<div class="empty">'+(monthFilter!==null?'이 달에는 기록이 없습니다.':'첫 수입을 기록해 보세요. 날짜·항목·금액만 있어도 충분합니다.')+'</div>';
    return;
  }
  let html='<table><thead><tr><th>날짜</th><th>항목</th><th>지급처</th><th class="hide-m">메모</th><th class="amt">금액</th><th></th></tr></thead><tbody>';
  list.forEach(e=>{
    html+='<tr><td>'+e.date.slice(5).replace('-','.')+'</td>'
      +'<td><span class="tag">'+esc(e.category)+'</span></td>'
      +'<td>'+esc(e.source)+'</td>'
      +'<td class="hide-m"><span class="memo">'+esc(e.memo)+'</span></td>'
      +'<td class="amt">'+won(e.amount)+'</td>'

/* ── CSV 불러오기 ── */
function parseCsv(text){
  text=text.replace(/^\uFEFF/,'');
  const rows=[];let row=[];let field='';let inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){
        if(text[i+1]==='"'){field+='"';i++;}
        else inQ=false;
      }else field+=ch;
    }else{
      if(ch==='"')inQ=true;
      else if(ch===','){row.push(field);field='';}
      else if(ch==='\n'||ch==='\r'){
        if(ch==='\r'&&text[i+1]==='\n')i++;
        row.push(field);field='';
        if(row.length>1||row[0]!=='')rows.push(row);
        row=[];
      }
      else field+=ch;
    }
  }
  if(field!==''||row.length){row.push(field);if(row.length>1||row[0]!=='')rows.push(row);}
  return rows;
}

$('importCsvBtn').addEventListener('click',()=>$('importCsvFile').click());
$('importCsvFile').addEventListener('change',async e=>{
  const file=e.target.files[0];
  e.target.value='';
  if(!file)return;
  const text=await file.text();
  const rows=parseCsv(text);
  if(!rows.length){toast('파일이 비어 있습니다.');return;}
  // 머리글 행 건너뛰기
  if(rows[0][0]&&rows[0][0].includes('날짜'))rows.shift();
  const imported=[];const errors=[];
  rows.forEach((r,i)=>{
    if(r.length<4){errors.push(i+1);return;}
    const date=(r[0]||'').trim();
    const amount=parseInt(String(r[3]).replace(/[^0-9]/g,''),10);
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date)||isNaN(new Date(date+'T00:00:00').getTime())||!amount){errors.push(i+1);return;}
    let category=(r[1]||'').trim();
    if(!CATS.includes(category))category='기타';
    imported.push({id:uid(),date,category,source:(r[2]||'').trim(),amount,memo:(r[4]||'').trim()});
  });
  if(!imported.length){toast('불러올 수 있는 기록이 없습니다. 이 장부에서 내려받은 CSV인지 확인해 주세요.');return;}

  let mode='replace';
  if(entries.length){
    if(confirm('현재 기록 '+entries.length+'건이 있습니다.\n\n[확인] 현재 기록을 모두 지우고, 불러온 '+imported.length+'건으로 교체합니다.\n[취소] 다음 단계에서 "추가"를 선택할 수 있습니다.')){
      mode='replace';
    }else if(confirm('불러온 '+imported.length+'건을 현재 기록 뒤에 추가할까요?\n(같은 내역이 겹치면 중복으로 쌓입니다.)')){
      mode='append';
    }else{
      toast('불러오기를 취소했습니다.');return;
    }
  }
  entries=(mode==='append')?entries.concat(imported):imported;
  await persist();
  monthFilter=null;
  const years=[...new Set(imported.map(x=>new Date(x.date+'T00:00:00').getFullYear()))].sort();
  if(!years.includes(year))year=years[years.length-1];
  render();
  toast(imported.length+'건을 불러왔습니다.'+(errors.length?' ('+errors.length+'행은 형식이 맞지 않아 건너뜀)':''));
});

/* ── 클로드 분석 요청문 만들기 ── */
function buildPrompt(){
  const ylist=yearEntries();
  const months=monthlyTotals(ylist);
  const cats=categoryTotals(ylist);
  const total=ylist.reduce((s,e)=>s+e.amount,0);
  const lines=ylist.slice().sort((a,b)=>a.date.localeCompare(b.date))
    .map(e=>e.date+' | '+e.category+' | '+(e.source||'-')+' | '+e.amount.toLocaleString()+'원'+(e.memo?' | '+e.memo:''));

  return '나는 프리랜서 작가(소설가·에세이스트)이고, 아래는 나의 '+year+'년 수입 장부야.\n\n'
+'[연간 총수입] '+total.toLocaleString()+'원\n'
+'[월별 합계] '+months.map((v,i)=>(i+1)+'월 '+v.toLocaleString()+'원').join(', ')+'\n'
+'[항목별 합계] '+cats.map(c=>c[0]+' '+c[1].toLocaleString()+'원').join(', ')+'\n'
+'[개별 내역]\n'+lines.join('\n')+'\n\n'
+'다음 관점으로 분석해 줘:\n'
+'1. 수입 안정성: 월별 기복이 얼마나 큰지, 수입이 없는 달이 있는지, 흐름이 안정적인지.\n'
+'2. 수입 구조: 인세·연재 원고료처럼 반복되는 수입과 강연·심사·상금 같은 일회성 수입의 비율, 특정 항목이나 지급처에 대한 의존도.\n'
+'3. 제안: 남은 기간 또는 내년을 위해 안정성을 높일 수 있는 현실적인 제안 2~3가지.\n\n'
+'과장된 격려 없이 담백하게, 숫자를 근거로 답해 줘.';
}
