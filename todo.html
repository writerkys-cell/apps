<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>할일</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: #f2f2f7;
    height: 100dvh;
    padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 16px);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* 오늘: 크고 네모난 카드 */
  .today-card {
    flex: 2.2;
    border: none;
    border-radius: 24px;
    background: #007aff;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .today-card:active { transform: scale(.98); }
  .today-card .label {
    font-size: 34px;
    font-weight: 700;
  }
  .today-card.running {
    background: #34c759;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .today-card.disabled {
    background: #d1d1d6;
    color: #8e8e93;
    animation: none;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .7; }
  }

  /* 체크박스: 카드 안 좌측 상단 */
  .checkbox {
    position: absolute;
    top: 16px; left: 16px;
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,.8);
    border-radius: 12px;
    background: rgba(255,255,255,.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: transparent;
    cursor: pointer;
    pointer-events: auto;
    transition: all .15s;
  }
  .today-card.disabled .checkbox {
    border-color: #34c759;
    background: #34c759;
    color: #fff;
  }

  /* 직사각형 버튼들 */
  .btn {
    flex: 1;
    border: none;
    border-radius: 18px;
    background: #fff;
    color: #007aff;
    font-size: 21px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .btn:active { transform: scale(.98); background: #e5e5ea; }
  .btn.running {
    background: #34c759;
    color: #fff;
    animation: pulse 1.5s ease-in-out infinite;
  }
</style>
</head>
<body>

  <button class="today-card" id="todayBtn" onclick="toggleToday()">
    <div class="checkbox" id="todayCheck" onclick="toggleCheck(event)"></div>
    <div class="label" id="todayLabel">오늘</div>
  </button>

  <button class="btn" id="focusBtn" onclick="toggleFocus()">오토포커스</button>
  <button class="btn" onclick="runShortcut('추가')">추가</button>
  <button class="btn" onclick="runShortcut('오늘할일')">오늘 할일</button>
  <button class="btn" onclick="runShortcut('내일')">내일 할일</button>

<script>
  function runShortcut(name) {
    location.href = 'shortcuts://run-shortcut?name=' + encodeURIComponent(name);
  }

  var todayRunning = false;
  var focusRunning = false;

  function toggleToday() {
    var card = document.getElementById('todayBtn');
    var label = document.getElementById('todayLabel');
    if (!todayRunning) {
      runShortcut('오늘');
      todayRunning = true;
      label.textContent = '실행중';
      card.classList.add('running');
    } else {
      runShortcut('오늘끝');
      todayRunning = false;
      label.textContent = '오늘';
      card.classList.remove('running');
    }
  }

  function toggleFocus() {
    var btn = document.getElementById('focusBtn');
    if (!focusRunning) {
      runShortcut('오토포커스');
      focusRunning = true;
      btn.textContent = '실행중';
      btn.classList.add('running');
    } else {
      runShortcut('오토포커스끝');
      focusRunning = false;
      btn.textContent = '오토포커스';
      btn.classList.remove('running');
    }
  }

  function toggleCheck(e) {
    e.stopPropagation();
    var card = document.getElementById('todayBtn');
    var check = document.getElementById('todayCheck');
    var checked = card.classList.toggle('disabled');
    check.textContent = checked ? '✓' : '';
    // 체크 해제도 가능하도록 체크박스만 클릭 허용
    check.style.pointerEvents = 'auto';
  }
</script>
</body>
</html>
