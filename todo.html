<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>할일</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: #f2f2f7;
    min-height: 100vh;
    padding: max(24px, env(safe-area-inset-top)) 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .row {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  /* 체크박스 */
  .checkbox {
    width: 34px; height: 34px;
    flex-shrink: 0;
    border: 2.5px solid #c7c7cc;
    border-radius: 10px;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: transparent;
    cursor: pointer;
    transition: all .15s;
  }
  .checkbox.checked {
    background: #34c759;
    border-color: #34c759;
    color: #fff;
  }
  /* 큰 버튼 */
  .btn {
    flex: 1;
    padding: 18px;
    font-size: 20px;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    background: #007aff;
    color: #fff;
    cursor: pointer;
    transition: all .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn.running {
    background: #34c759;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .btn:disabled {
    background: #d1d1d6;
    color: #8e8e93;
    animation: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .65; }
  }
  /* 작은 버튼 */
  .row.small { gap: 10px; margin-top: 4px; }
  .btn-sm {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: #e5e5ea;
    color: #007aff;
    cursor: pointer;
  }
  .btn-sm:active { transform: scale(.97); background: #d1d1d6; }
  /* 오토포커스 줄: 체크박스 자리만큼 들여쓰기 없이 전체 폭 */
</style>
</head>
<body>

  <div class="row">
    <div class="checkbox" id="todayCheck" onclick="toggleCheck()"></div>
    <button class="btn" id="todayBtn" onclick="toggleToday()">오늘</button>
  </div>

  <div class="row">
    <button class="btn" id="focusBtn" onclick="toggleFocus()">오토포커스</button>
  </div>

  <div class="row small">
    <button class="btn-sm" onclick="runShortcut('내일')">내일 할일</button>
    <button class="btn-sm" onclick="runShortcut('추가')">추가</button>
  </div>

<script>
  function runShortcut(name) {
    location.href = 'shortcuts://run-shortcut?name=' + encodeURIComponent(name);
  }

  var todayRunning = false;
  var focusRunning = false;

  function toggleToday() {
    var btn = document.getElementById('todayBtn');
    if (!todayRunning) {
      runShortcut('오늘');
      todayRunning = true;
      btn.textContent = '실행중';
      btn.classList.add('running');
    } else {
      runShortcut('오늘끝');
      todayRunning = false;
      btn.textContent = '오늘';
      btn.classList.remove('running');
    }
  }

  function toggleFocus() {
    var btn = document.getElementById('focusBtn');
    if (!focusRunning) {
      runShortcut('오토포커스');
      focusRunning = true;
      btn.textContent = '실행중';
      btn.classList.add('running');
    } else {
      runShortcut('오토포커스끝');
      focusRunning = false;
      btn.textContent = '오토포커스';
      btn.classList.remove('running');
    }
  }

  function toggleCheck() {
    var check = document.getElementById('todayCheck');
    var btn = document.getElementById('todayBtn');
    var checked = check.classList.toggle('checked');
    check.textContent = checked ? '✓' : '';
    btn.disabled = checked;
  }
</script>
</body>
</html>
